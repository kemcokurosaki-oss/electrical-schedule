<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>йӣ»ж°—е·ҘзЁӢзўәиӘҚиЎЁ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
  <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
      font-size: 12px;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 44px;
    }

    header h1 { font-size: 16px; font-weight: bold; }

    /* в”Җв”Җв”Җ гӮҝгғ– в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .tab-group { display: flex; gap: 4px; margin-left: 16px; }
    .tab-btn {
      padding: 4px 16px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
    }
    .tab-btn.active {
      background: rgba(255,255,255,0.25);
      border-color: white;
      font-weight: bold;
    }
    .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #555;
    }
    #loading-overlay.visible { display: flex; }

    /* в”Җв”Җв”Җ иЎЁгғ“гғҘгғј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #view-table { display: block; }

    #table-gap {
      height: 16px;
      background: #f0f2f5;
    }

    #table-wrapper {
      overflow: auto;
      padding: 0 16px 16px 0;
      max-height: calc(100vh - 44px - 16px);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      border-top: 1px solid #bbb;
      border-left: 1px solid #bbb;
      white-space: nowrap;
      background: white;
    }

    th, td {
      border-right: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
      padding: 2px 6px;
      text-align: center;
      vertical-align: middle;
    }

    .col-no, .col-item {
      position: sticky;
      background: white;
      z-index: 10;
    }
    .col-no  { left: 0; min-width: 36px; max-width: 36px; }
    .col-item { left: 36px; min-width: 300px; max-width: 300px; text-align: left; }

    thead tr th {
      background: #1a3a5c;
      color: white;
      font-weight: bold;
      position: sticky;
      z-index: 20;
    }
    thead tr:nth-child(1) th { top: 0; }
    thead tr:nth-child(2) th { top: 25px; }
    thead tr:nth-child(3) th { top: 50px; }
    thead th.col-no, thead th.col-item { z-index: 30; background: #1a3a5c; text-align: center; }

    .header-client  { background: #2c5282 !important; font-size: 11px; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    .header-number  { background: #2d6a9f !important; }
    .header-machine { background: #3182ce !important; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }

    td.cell-date {
      min-width: 105px;
      max-width: 105px;
      font-size: 13px;
      cursor: pointer;
    }
    td.cell-owner {
      min-width: 105px;
      max-width: 105px;
      font-size: 11px;
      color: #333;
      cursor: pointer;
    }
    td.cell-status {
      min-width: 105px;
      max-width: 105px;
      font-size: 10px;
      color: #333;
      cursor: pointer;
    }

    tr.row-date td { background: #fff; height: 27px; border-top: 1.5px solid #888; border-bottom: 1px dashed #ccc; }
    tr.row-date td.col-no   { background: #f7fafc; font-weight: bold; }
    tr.row-date td.col-item { background: #f7fafc; font-weight: bold; }
    tbody tr.row-date:first-child td { border-top: 1px solid #bbb; }
    .proj-group-end { border-right: 1.5px solid #888 !important; }

    tr.row-owner td { background: #f7fafc; border-top: none; height: 25px; }
    tr.row-owner td.col-no   { background: #edf2f7; }
    tr.row-owner td.col-item { background: #edf2f7; font-weight: bold; }

    tr.row-status td { background: #f7fafc; border-top: none; height: 25px; border-bottom: 1px dashed #ccc; }
    tr.row-status td.col-no   { background: #edf2f7; }
    tr.row-status td.col-item { background: #edf2f7; font-size: 10px; color: #666; }

    tr.row-shipping td { background: #fffbeb; font-weight: bold; }
    tr.row-shipping td.col-no   { background: #fef3c7; }
    tr.row-shipping td.col-item { background: #fef3c7; }
    tr.row-shipping td.cell-date { color: #b45309; font-size: 13px; }


    .status-label {
      display: inline-block;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 18px;
    }
    .status-label.lbl-wip  { background: #b7eb8f; color: #333; }
    .status-label.lbl-done { background: #e2e8f0; color: #888; }
    .status-label.lbl-na   { color: #888; }

    tr.row-status td.proc-wip  { background: #b7eb8f !important; }
    td.cell-date.proc-done     { background: #e8e8e8 !important; color: #bbb; }
    tr.row-status td.proc-done { background: #e8e8e8 !important; }

    td.cell-date.proc-na { position: relative; overflow: hidden; }
    td.cell-date.proc-na::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        135deg, transparent, transparent 5px,
        rgba(100,100,100,0.3) 5px, rgba(100,100,100,0.3) 6px
      );
      pointer-events: none;
    }

    #no-data {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 14px;
    }

    /* в”Җв”Җв”Җ йғЁзҪІеҲҘгӮ«гғ©гғјпјҲе…Ё3иЎҢгҒ®е·Ұеӣәе®ҡеҲ—пјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    tr.dept-eigyo  td.col-no, tr.dept-eigyo  td.col-item { background: #FDE8C8 !important; }
    tr.dept-sekkei td.col-no, tr.dept-sekkei td.col-item { background: #D6EAF8 !important; }
    tr.dept-denki  td.col-no, tr.dept-denki  td.col-item { background: #FFF0F5 !important; }
    tr.dept-sosou  td.col-no, tr.dept-sosou  td.col-item { background: #FAD4D0 !important; }
    tr.dept-denso  td.col-no, tr.dept-denso  td.col-item { background: #EBD9F5 !important; }

    /* в”Җв”Җв”Җ гӮ¬гғігғҲгғ“гғҘгғј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #view-gantt {
      display: none;
      flex-direction: column;
      height: calc(100vh - 44px);
    }
    #view-gantt.active { display: flex; }

    #gantt-toolbar {
      flex-shrink: 0;
      height: 36px;
      background: #f7fafc;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
    }
    .toolbar-label { font-size: 11px; color: #666; margin-right: 2px; }
    .zoom-btn {
      padding: 3px 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
    }
    .zoom-btn.zoom-active { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .zoom-btn:hover:not(.zoom-active) { background: #edf2f7; }
    #btn-today {
      margin-left: 8px;
      padding: 3px 12px;
      border: 1px solid #1a3a5c;
      border-radius: 3px;
      background: white;
      color: #1a3a5c;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
    }
    #btn-today:hover { background: #1a3a5c; color: white; }

    /* гӮ¬гғігғҲгғҒгғЈгғјгғҲеҮЎдҫӢ */
    .gantt-legend {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      font-size: 11px;
      color: #555;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-box {
      width: 14px;
      height: 10px;
      border-radius: 2px;
      border: 1px solid;
    }
    .legend-box.wip     { background: #68d391; border-color: #38a169; }
    .legend-box.done    { background: #a0aec0; border-color: #718096; }
    .legend-box.na      { background: #e2e8f0; border-color: #cbd5e0; }
    .legend-box.pending { background: #90cdf4; border-color: #3182ce; }

    #gantt-container { flex: 1; overflow: hidden; }

    /* гӮ¬гғігғҲгғҗгғјгҒ®иүІ */
    .gantt_task_line.gantt-wip     { background-color: #68d391; border-color: #38a169; }
    .gantt_task_line.gantt-done    { background-color: #a0aec0; border-color: #718096; }
    .gantt_task_line.gantt-na      { background-color: #e2e8f0; border-color: #cbd5e0; }
    .gantt_task_line.gantt-pending { background-color: #90cdf4; border-color: #3182ce; }
    .gantt_task_line.gantt-project { background-color: #2d6a9f; border-color: #1a3a5c; height: 14px !important; margin-top: 7px !important; }

    /* жӢ…еҪ“иҖ…гғҶгӮӯгӮ№гғҲгҒҢжһ гҒ«еҸҺгҒҫгӮүгҒӘгҒ„е ҙеҗҲгҒ« вҖҰ гҒ§зңҒз•Ҙ */
    .gantt_task_content { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* д»Ҡж—ҘгғһгғјгӮ«гғј */
    .gantt_marker.today-line { background-color: #e53e3e; width: 2px; }
    .gantt_marker_content { font-size: 10px; font-weight: bold; color: #e53e3e; padding: 0 3px; background: rgba(255,255,255,0.85); border-radius: 2px; font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif !important; }

    /* гӮ¬гғігғҲгғҒгғЈгғјгғҲе…ЁдҪ“гғ•гӮ©гғігғҲпјҲDHTMLXдёҠжӣёгҒҚпјү */
    #gantt-container * { font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif !important; }

    /* в”Җв”Җв”Җ з·ЁйӣҶгғқгғғгғ—гӮўгғғгғ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #edit-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
    }
    #edit-popup.active { display: flex; }

    .popup-box {
      background: white;
      border-radius: 8px;
      min-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .popup-header {
      background: #1a3a5c;
      color: white;
      padding: 12px 16px;
    }
    .popup-header .proc-name { font-weight: bold; font-size: 13px; }
    .popup-header .proj-info { font-size: 11px; color: #a0aec0; margin-top: 3px; }
    .popup-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .popup-field { display: flex; flex-direction: column; gap: 4px; }
    .popup-field label { font-size: 11px; color: #666; font-weight: bold; }
    .popup-field select,
    .popup-field input[type="date"] {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
      background: white;
      width: 100%;
    }
    .popup-footer {
      padding: 10px 16px;
      background: #f7fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .popup-footer button {
      padding: 6px 18px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
    }
    #popup-cancel { background: #e2e8f0; color: #444; }
    #popup-save   { background: #1a3a5c; color: white; }
    #popup-save:hover { background: #2c5282; }

    /* в”Җв”Җв”Җ е·Ҙз•Әз®ЎзҗҶгғңгӮҝгғі в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #btn-manage {
      margin-left: auto;
      padding: 4px 14px;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
    }
    #btn-manage:hover { background: rgba(255,255,255,0.15); }

    /* в”Җв”Җв”Җ е·Ҙз•Әз®ЎзҗҶгғўгғјгғҖгғ« в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    #manage-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
    }
    #manage-modal.active { display: flex; }

    .manage-box {
      background: white;
      border-radius: 8px;
      width: 500px;
      max-height: 80vh;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .manage-header {
      background: #1a3a5c;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .manage-header h2 { font-size: 14px; font-weight: bold; }
    .manage-close {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
    .manage-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .manage-status-bar {
      font-size: 11px;
      padding: 6px 10px;
      background: #f7fafc;
      border-radius: 4px;
      border-left: 3px solid #2d6a9f;
      color: #444;
    }
    .manage-list { display: flex; flex-direction: column; gap: 6px; }
    .manage-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      background: white;
    }
    .manage-item.is-visible {
      background: #ebf8ff;
      border-color: #bee3f8;
    }
    .manage-item-info { display: flex; flex-direction: column; gap: 2px; }
    .manage-item-num { font-weight: bold; font-size: 13px; }
    .manage-item-detail { font-size: 11px; color: #666; }
    .manage-item-btn {
      padding: 4px 12px;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .manage-item-btn:disabled { opacity: 0.5; cursor: default; }
    .btn-add-proj  { background: #1a3a5c; color: white; }
    .btn-add-proj:hover:not(:disabled)  { background: #2c5282; }
    .btn-rm-proj   { background: #e2e8f0; color: #444; }
    .btn-rm-proj:hover:not(:disabled)   { background: #cbd5e0; }

    /* в”Җв”Җв”Җ flatpickr гӮ«гӮ№гӮҝгғ  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .flatpickr-calendar {
      font-family: 'Meiryo', 'гғЎгӮӨгғӘгӮӘ', sans-serif;
      font-size: 11px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      border-radius: 5px;
      width: auto !important;
    }
    .flatpickr-calendar.multiMonth .flatpickr-days .dayContainer {
      min-width: 168px !important;
      max-width: 168px !important;
      width: 168px !important;
    }
    .flatpickr-day {
      max-width: 24px !important;
      height: 24px !important;
      line-height: 24px !important;
      font-size: 11px !important;
    }
    .flatpickr-weeks { display: none !important; }
    .flatpickr-months { height: 30px; }
    .flatpickr-months .flatpickr-month { height: 30px; line-height: 30px; }
    .flatpickr-current-month { font-size: 12px; padding-top: 5px; }
    .flatpickr-current-month .flatpickr-monthDropdown-months { font-size: 12px; }
    .flatpickr-current-month input.cur-year { font-size: 12px; }
    .flatpickr-weekday { font-size: 10px !important; height: 22px; line-height: 22px; }
    .flatpickr-innerContainer { padding: 4px 6px 6px; }
    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
      background: #1a3a5c;
      border-color: #1a3a5c;
    }
    .flatpickr-day.inRange {
      background: #bee3f8;
      border-color: #bee3f8;
      box-shadow: -5px 0 0 #bee3f8, 5px 0 0 #bee3f8;
    }

    13: DEPT_OWNERS.йӣ»жҠҖ, 14: DEPT_OWNERS.йӣ»жҠҖ, 15: DEPT_OWNERS.йӣ»жҠҖ,
    16: DEPT_OWNERS.йӣ»иЈ…,
    17: DEPT_OWNERS.йӣ»жҠҖ, 18: DEPT_OWNERS.йӣ»жҠҖ,
    19: DEPT_OWNERS.йӣ»иЈ…, 20: DEPT_OWNERS.йӣ»иЈ…,
    21: DEPT_OWNERS.ж“ҚжҘӯ, 22: DEPT_OWNERS.ж“ҚжҘӯ,
  };

  // в”Җв”Җв”Җ йғЁзҪІвҶ’гӮҜгғ©гӮ№еҗҚгғһгғғгғ”гғігӮ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const PROCESS_DEPT = {

     4: 'denki',   8: 'denki',   9: 'denki',  11: 'denki',

  // в”Җв”Җв”Җ е·ҘзЁӢгғ•гғӯгғј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const PROCESS_FLOW = {

    13: 'EвҶ’е®ўе…Ҳ', 14: 'EвҶ’д»ЈзҗҶеә—', 15: 'EвҶ’A',   16: 'AвҶ’E',
    17: 'EвҶ’A',   18: 'E',        20: 'A',
    21: 'S',      22: 'A',
  };

  // в”Җв”Җв”Җ гғўгӮёгғҘгғјгғ«гғ¬гғҷгғ«гҒ®зҠ¶ж…Ӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let statusMap = {};        // "projNum__machine__procNo" вҶ’ { status, start_date, end_date, tantousha }
  let currentProjects = [];
  let currentLinkedMap = {};
  let editCtx = null;
  let activeInlineEdit = null;
  let ganttInitialized = false;
  let datePicker = null;
  let datePickerSave = null;

  let visibleProjectNums = new Set(); // denki_visible_projects гҒ«зҷ»йҢІгҒ•гӮҢгҒҹе·Ҙз•Ә
  let allAvailableProjects = [];      // е®ҢдәҶйҷӨеӨ–жёҲгҒҝгҒ®е…Ёе·Ҙз•ӘпјҲз®ЎзҗҶгғ‘гғҚгғ«з”Ёпјү
  let currentDetailProjNum = null;    // и©ізҙ°гғ“гғҘгғјгҒ§й–ӢгҒ„гҒҰгҒ„гӮӢе·Ҙз•Ә

  const SVG_EXPAND   = `<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M0,4 L0,0 L4,0 L4,1.5 L1.5,1.5 L1.5,4 Z M8,0 L12,0 L12,4 L10.5,4 L10.5,1.5 L8,1.5 Z M0,8 L1.5,8 L1.5,10.5 L4,10.5 L4,12 L0,12 Z M8,10.5 L10.5,10.5 L10.5,8 L12,8 L12,12 L8,12 Z"/></svg>`;
  const SVG_COLLAPSE = `<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M4,0 L4,4 L0,4 L0,2.5 L2.5,2.5 L2.5,0 Z M8,0 L9.5,0 L9.5,2.5 L12,2.5 L12,4 L8,4 Z M0,8 L4,8 L4,12 L2.5,12 L2.5,9.5 L0,9.5 Z M8,8 L12,8 L12,9.5 L9.5,9.5 L9.5,12 L8,12 Z"/></svg>`;

  // в”Җв”Җв”Җ гғҰгғјгғҶгӮЈгғӘгғҶгӮЈ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function fmtDate(dateStr) {
    if (!dateStr) return '';
    const parts = String(dateStr).split('T')[0].split('-');
    if (parts.length !== 3) return '';
    return `${parts[0].slice(-2)}/${parts[1]}/${parts[2]}`;
  }

  function fmtDateRange(start, end) {
    const s = fmtDate(start);
    const e = fmtDate(end);
    if (s && e) return `${s}пҪһ${e}`;
    if (s) return `${s}пҪһ`;
    return '';
  }

  function getStatusClass(status) {
    return { 'дҪңжҘӯдёӯ': 'wip', 'е®ҢдәҶ': 'done', 'еҜҫиұЎеӨ–': 'na' }[status] || 'pending';
  }

  function parseLocalDate(str) {
    if (!str) return null;
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function calcLinkedStatus(startDate, endDate, taskStatus) {
    if (taskStatus === 'е®ҢдәҶ') return 'е®ҢдәҶ';
    if (!startDate) return '';
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const start = parseLocalDate(startDate);
    if (!start || today < start) return '';
    return 'дҪңжҘӯдёӯ';
  }

  // в”Җв”Җв”Җ гӮҝгғ–еҲҮжӣҝ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  document.getElementById('btn-detail-back').addEventListener('click', () => closeDetailView());

  document.getElementById('tab-table').addEventListener('click', () => {
    document.getElementById('tab-table').classList.add('active');
    document.getElementById('tab-gantt').classList.remove('active');
    document.getElementById('view-detail').style.display = 'none';
    document.getElementById('view-table').style.display = '';
    document.getElementById('view-gantt').classList.remove('active');
    currentDetailProjNum = null;
    updateDetailButtons();
  });

  document.getElementById('tab-gantt').addEventListener('click', () => {
    document.getElementById('tab-gantt').classList.add('active');
    document.getElementById('tab-table').classList.remove('active');
    document.getElementById('view-detail').style.display = 'none';
    document.getElementById('view-table').style.display = 'none';
    document.getElementById('view-gantt').classList.add('active');
    currentDetailProjNum = null;
    setTimeout(() => showGantt(), 50);
  });

  // в”Җв”Җв”Җ гғқгғғгғ—гӮўгғғгғ—ж“ҚдҪң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function openPopup({ projNum, machine, procNo, procName,
                       dateTd, statusTd, statusSpan, ownerSpan, dateRangeSpan,
                       source, ganttId }) {
    const key = `${projNum}__${machine}__${procNo}`;
    const rec = statusMap[key] || {};

    document.getElementById('popup-proc-name').textContent = `No.${procNo}гҖҖ${procName}`;
    document.getElementById('popup-proj-info').textContent = `е·Ҙз•Ә: ${projNum}гҖҖж©ҹзЁ®: ${machine || 'в”Җ'}`;
    document.getElementById('popup-status').value = rec.status || '';
    document.getElementById('popup-start').value  = rec.start_date || '';
    document.getElementById('popup-end').value    = rec.end_date   || '';

    const ownerSel = document.getElementById('popup-owner');
    ownerSel.innerHTML = '<option value="">в”Җ</option>';
    (PROCESS_OWNERS[procNo] || []).forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name;
      ownerSel.appendChild(o);
    });
    ownerSel.value = rec.tantousha || '';

    editCtx = { projNum, machine, procNo, key,
                dateTd, statusTd, statusSpan, ownerSpan, dateRangeSpan,
                source: source || 'table', ganttId: ganttId || null };
    document.getElementById('edit-popup').classList.add('active');
  }

  function closePopup() {
    document.getElementById('edit-popup').classList.remove('active');
    editCtx = null;
  }

  document.getElementById('edit-popup').addEventListener('click', e => {
    if (e.target === document.getElementById('edit-popup')) closePopup();
  });
  document.getElementById('popup-cancel').addEventListener('click', closePopup);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

  document.getElementById('popup-save').addEventListener('click', async () => {
    if (!editCtx) return;

    const status     = document.getElementById('popup-status').value;
    const start_date = document.getElementById('popup-start').value || null;
    const end_date   = document.getElementById('popup-end').value   || null;
    const tantousha  = document.getElementById('popup-owner').value || null;

    const existingMemo = (statusMap[editCtx.key] || {}).memo || null;
    await saveRecord(editCtx.projNum, editCtx.machine, editCtx.procNo, { status, start_date, end_date, tantousha, memo: existingMemo });

    // statusMap жӣҙж–°
    const isEmpty = !status && !start_date && !end_date && !tantousha && !existingMemo;
    if (isEmpty) {
      delete statusMap[editCtx.key];
    } else {
      statusMap[editCtx.key] = { status, start_date, end_date, tantousha, memo: existingMemo };
    }

    if (editCtx.source === 'gantt' && editCtx.ganttId) {
      // гӮ¬гғігғҲгӮҝгӮ№гӮҜгӮ’жӣҙж–°
      try {
        const task = gantt.getTask(editCtx.ganttId);
        if (task) {
          task.owner       = tantousha || '';
          task.statusClass = getStatusClass(status);
          task.statusLabel = status || '';
          task.start_date_str = start_date || task.start_date_str;
          task.end_date_str   = end_date || null;
          if (start_date) task.start_date = parseLocalDate(start_date);
          if (end_date) {
            const endD = parseLocalDate(end_date);
            endD.setDate(endD.getDate() + 1);
            task.end_date = endD;
            task.duration = Math.round((endD - task.start_date) / 86400000);
          } else {
            task.duration = 1;
          }
          gantt.updateTask(editCtx.ganttId);
        }
      } catch(e) { console.warn('Gantt update:', e); }
    } else {
      // гғҶгғјгғ–гғ«DOMгӮ’жӣҙж–°
      applyStatusStyle(editCtx.dateTd, editCtx.statusTd, editCtx.statusSpan, status);
      if (editCtx.ownerSpan)     editCtx.ownerSpan.textContent = tantousha || '';
      if (editCtx.dateRangeSpan) editCtx.dateRangeSpan.textContent = fmtDate(start_date);
    }

    closePopup();
  });

  // в”Җв”Җв”Җ гғЎгӮӨгғіеҮҰзҗҶ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async function init() {
    const { data: completedData } = await sb.from('completed_projects').select('project_number');
    const completedNums = new Set((completedData || []).map(c => String(c.project_number)));

    const { data: shipTasks, error: e1 } = await sb
      .from('tasks')
      .select('project_number, machine, customer_name, start_date')
      .eq('text', 'е·Ҙе ҙеҮәиҚ·')
      .order('project_number', { ascending: true });

    if (e1) { console.error(e1); hideLoading(); return; }

    const seen = new Set();
    allAvailableProjects = (shipTasks || []).filter(p => {
      if (completedNums.has(String(p.project_number))) return false;
      const key = `${p.project_number}__${p.machine}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    // иЎЁзӨәе·Ҙз•Әгғ•гӮЈгғ«гӮҝгғјеҸ–еҫ—пјҲз©әгҒӘгӮүе…Ёд»¶иЎЁзӨәпјү
    const { data: visibleData } = await sb.from('denki_visible_projects').select('project_number');
    visibleProjectNums = new Set((visibleData || []).map(r => String(r.project_number)));

    currentProjects = allAvailableProjects.filter(p => visibleProjectNums.has(String(p.project_number)));

    if (currentProjects.length === 0) {
      hideLoading();
      document.getElementById('no-data').style.display = 'block';
      return;
    }

    const linkedTexts   = PROCESSES.filter(p => p.linked).map(p => p.taskText);
    const projectNumbers = [...new Set(currentProjects.map(p => p.project_number))];

    const { data: linkedTasks } = await sb
      .from('tasks')
      .select('project_number, machine, text, start_date, end_date, owner, status')
      .in('project_number', projectNumbers)
      .in('text', linkedTexts);

    currentLinkedMap = {};
    (linkedTasks || []).forEach(t => {
      const key = `${t.project_number}__${t.machine}__${t.text}`;
      if (!currentLinkedMap[key]) currentLinkedMap[key] = { start_date: t.start_date, end_date: t.end_date, owner: t.owner || '', status: t.status || '' };
    });

    const { data: custData } = await sb
      .from('tasks')
      .select('project_number, customer_name')
      .in('project_number', projectNumbers)
      .not('customer_name', 'is', null);
    const custMap = {};
    (custData || []).forEach(t => {
      if (t.customer_name && !custMap[t.project_number]) custMap[t.project_number] = t.customer_name;
    });
    currentProjects.forEach(p => {
      if (!p.customer_name) p.customer_name = custMap[p.project_number];
    });

    statusMap = {};
    try {
      const { data: statusData } = await sb
        .from('denki_process_status')
        .select('project_number, machine, process_no, status, start_date, end_date, tantousha, memo');
      (statusData || []).forEach(s => {
        statusMap[`${s.project_number}__${s.machine}__${s.process_no}`] = {
          status:     s.status,
          start_date: s.start_date,
          end_date:   s.end_date,
          tantousha:  s.tantousha,
          memo:       s.memo,
        };
      });
    } catch(e) { /* ignore */ }

    renderTable(currentProjects, currentLinkedMap);
    document.getElementById('main-table').style.display = '';
    hideLoading();
  }

  // в”Җв”Җв”Җ иЎЁгғ¬гғігғҖгғӘгғігӮ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function renderTable(projects, linkedMap) {
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');

    const projectGroups = [];
    let prevNum = null;
    projects.forEach(p => {
      if (p.project_number === prevNum) {
        projectGroups[projectGroups.length - 1].count++;
      } else {
        projectGroups.push({ project_number: p.project_number, customer_name: p.customer_name, count: 1 });
        prevNum = p.project_number;
      }
    });

    let _cum = 0;
    const groupEndIdx = new Set();
    projectGroups.forEach((g, gi) => {
      _cum += g.count;
      if (gi < projectGroups.length - 1) groupEndIdx.add(_cum - 1);
    });

    thead.innerHTML = '';

    // иЎҢ1: е·Ҙз•Ә + и©ізҙ°гғңгӮҝгғі
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = 'е·Ҙз•Ә'; tr.appendChild(thItem);
      projectGroups.forEach((g, gi) => {
        const th = document.createElement('th');
        th.className = 'header-number' + (gi < projectGroups.length - 1 ? ' proj-group-end' : '');
        th.textContent = g.project_number;
        if (g.count > 1) th.colSpan = g.count;
        const btn = document.createElement('button');
        btn.className = 'btn-detail';
        btn.dataset.projNum = String(g.project_number);
        btn.innerHTML = currentDetailProjNum === String(g.project_number) ? SVG_COLLAPSE : SVG_EXPAND;
        btn.title = currentDetailProjNum === String(g.project_number) ? 'дёҖиҰ§гҒ«жҲ»гӮӢ' : 'и©ізҙ°иЎЁзӨә';
        btn.addEventListener('click', e => {
          e.stopPropagation();
          if (currentDetailProjNum === String(g.project_number)) {
            closeDetailView();
          } else {
            openDetailView(String(g.project_number));
          }
        });
        th.appendChild(btn);
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // иЎҢ2: е®ўе…ҲеҗҚ
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = 'е®ўе…Ҳ'; tr.appendChild(thItem);
      projectGroups.forEach((g, gi) => {
        const th = document.createElement('th');
        th.className = 'header-client' + (gi < projectGroups.length - 1 ? ' proj-group-end' : '');
        th.textContent = g.customer_name || 'в”Җ';
        if (g.customer_name) th.title = g.customer_name;
        if (g.count > 1) th.colSpan = g.count;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // иЎҢ3: ж©ҹзЁ®
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = 'ж©ҹзЁ®'; tr.appendChild(thItem);
      projects.forEach((p, pi) => {
        const th = document.createElement('th');
        th.className = 'header-machine' + (groupEndIdx.has(pi) ? ' proj-group-end' : '');
        th.textContent = p.machine || 'в”Җ';
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    tbody.innerHTML = '';

    PROCESSES.forEach(proc => {
      // ж—Ҙд»ҳиЎҢ
      const deptClass = PROCESS_DEPT[proc.no] ? ` dept-${PROCESS_DEPT[proc.no]}` : '';
      const trDate = document.createElement('tr');
      trDate.className = `row-date${deptClass}`;
      const tdNo = document.createElement('td'); tdNo.className = 'col-no'; tdNo.textContent = proc.no;
      const tdItem = document.createElement('td'); tdItem.className = 'col-item'; tdItem.textContent = proc.name;
      if (proc.linked) tdItem.title = 'е…ЁдҪ“е·ҘзЁӢиЎЁгҒЁйҖЈжҗә';
      trDate.appendChild(tdNo);
      trDate.appendChild(tdItem);

      const dateTds = [];
      const dateRangeSpans = [];

      projects.forEach((proj, pi) => {
        const td = document.createElement('td');
        td.className = 'cell-date' + (proc.linked ? ' linked' : '') + (groupEndIdx.has(pi) ? ' proj-group-end' : '');
        if (proc.linked) {
          const key = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          td.textContent = fmtDate(linkedMap[key]?.start_date);
          dateRangeSpans.push(null);
        } else {
          const statusKey = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
          const rec = statusMap[statusKey] || {};
          const span = document.createElement('span');
          span.textContent = fmtDate(rec.start_date);
          td.appendChild(span);
          dateRangeSpans.push(span);
        }
        dateTds.push(td);
        trDate.appendChild(td);
      });
      tbody.appendChild(trDate);

      // жӢ…еҪ“иҖ…иЎҢ
      const trOwner = document.createElement('tr');
      trOwner.className = `row-owner${deptClass}`;
      const tdNoO = document.createElement('td'); tdNoO.className = 'col-no';
      const tdItemO = document.createElement('td'); tdItemO.className = 'col-item'; tdItemO.textContent = PROCESS_FLOW[proc.no] || '';
      trOwner.appendChild(tdNoO);
      trOwner.appendChild(tdItemO);

      const ownerSpans = [];
      projects.forEach((proj, pi) => {
        const statusKey = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
        const rec = statusMap[statusKey] || {};
        const td = document.createElement('td');
        td.className = 'cell-owner' + (proc.linked ? ' linked' : '') + (groupEndIdx.has(pi) ? ' proj-group-end' : '');
        const span = document.createElement('span');
        let displayOwner;
        if (proc.linked) {
          const linkedKey = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          displayOwner = linkedMap[linkedKey]?.owner || '';
        } else {
          displayOwner = rec.tantousha || '';
        }
        span.textContent = displayOwner;
        td.appendChild(span);
        ownerSpans.push(span);
        trOwner.appendChild(td);
      });
      // гӮ№гғҶгғјгӮҝгӮ№иЎҢ
      const trStatus = document.createElement('tr');
      trStatus.className = `row-status${deptClass}`;

      projects.forEach((proj, pi) => {
        const statusKey = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;

        const dateTd = dateTds[pi];

        const td = document.createElement('td');
        td.className = 'cell-status' + (groupEndIdx.has(pi) ? ' proj-group-end' : '');

        const statusSpan = document.createElement('span');
        statusSpan.className = 'status-label';
        if (proc.linked) {
          const lk = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          applyStatusStyle(dateTd, td, statusSpan, calcLinkedStatus(currentLinkedMap[lk]?.start_date, currentLinkedMap[lk]?.end_date, currentLinkedMap[lk]?.status));
        } else {
          applyStatusStyle(dateTd, td, statusSpan, rec.status || '');
        }
        td.appendChild(statusSpan);

        if (!proc.linked) {
          td.addEventListener('dblclick', () => editStatusCell(td, dateTd, proj, proc));
          dateTd.addEventListener('dblclick', () => editDateCell(dateTd, proj, proc));
          const ownerTd = trOwner.children[pi + 2];
          ownerTd.addEventListener('dblclick', () => editOwnerCell(ownerTd, proj, proc));
        }

        trStatus.appendChild(td);
      });
      tbody.appendChild(trOwner);
      tbody.appendChild(trStatus);
    });

    // еҮәиҚ·ж—ҘиЎҢ
    const trShip = document.createElement('tr');
    trShip.className = 'row-shipping';
    const tdNoShip = document.createElement('td'); tdNoShip.className = 'col-no'; tdNoShip.textContent = '23';
    const tdItemShip = document.createElement('td'); tdItemShip.className = 'col-item'; tdItemShip.textContent = 'е·Ҙе ҙеҮәиҚ·ж—Ҙ';
    trShip.appendChild(tdNoShip);
    trShip.appendChild(tdItemShip);
    projects.forEach((proj, pi) => {
      const td = document.createElement('td');
      td.className = 'cell-date linked' + (groupEndIdx.has(pi) ? ' proj-group-end' : '');
      td.textContent = fmtDate(proj.start_date);
      trShip.appendChild(td);
    });
    tbody.appendChild(trShip);
  }

  function showLoading() {
    document.getElementById('loading-overlay').classList.add('visible');
  }

  function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('visible');

  // в”Җв”Җв”Җ е·Ҙз•Әз®ЎзҗҶгғўгғјгғҖгғ« в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  document.getElementById('btn-manage').addEventListener('click', openManageModal);
  document.getElementById('manage-close').addEventListener('click', closeManageModal);
  document.getElementById('manage-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('manage-modal')) closeManageModal();
  });

  function openManageModal() {
    renderManageList();
    document.getElementById('manage-modal').classList.add('active');
  }

  function closeManageModal() {
    document.getElementById('manage-modal').classList.remove('active');
  }

  function renderManageList() {
    const statusBar = document.getElementById('manage-status');
    const list = document.getElementById('manage-list');

    const registeredCount = visibleProjectNums.size;
    statusBar.textContent = registeredCount === 0
      ? 'зҷ»йҢІгҒ•гӮҢгҒҰгҒ„гӮӢе·Ҙз•ӘгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“'
      : `${registeredCount}д»¶гҒ®е·Ҙз•ӘгӮ’зҷ»йҢІдёӯ`;
    statusBar.className = 'manage-status-bar';

    list.innerHTML = '';

    // е·Ҙз•ӘгҒ”гҒЁгҒ«1гӮЁгғігғҲгғӘпјҲж©ҹзЁ®гҒҜ detail гҒ«еҲ—жҢҷпјү
    const seenNums = new Set();
    const uniqueProjects = [];
    allAvailableProjects.forEach(p => {
      const pn = String(p.project_number);
      if (!seenNums.has(pn)) {
        seenNums.add(pn);
        uniqueProjects.push(p);
      }
    });

    uniqueProjects.sort((a, b) =>
      String(a.project_number).localeCompare(String(b.project_number))
    );

    uniqueProjects.forEach(p => {
      const pn = String(p.project_number);
      const isVisible = visibleProjectNums.has(pn);

      const machines = allAvailableProjects
        .filter(ap => String(ap.project_number) === pn && ap.machine)
        .map(ap => ap.machine)
        .join(' / ');

      const item = document.createElement('div');
      item.className = 'manage-item' + (isVisible ? ' is-visible' : '');

      const info = document.createElement('div');
      info.className = 'manage-item-info';

      const numSpan = document.createElement('span');
      numSpan.className = 'manage-item-num';
      numSpan.textContent = pn;
      info.appendChild(numSpan);

      const detail = [p.customer_name, machines].filter(Boolean).join('гҖҖ');
      if (detail) {
        const detailSpan = document.createElement('span');
        detailSpan.className = 'manage-item-detail';
        detailSpan.textContent = detail;
        info.appendChild(detailSpan);
      }

      const btn = document.createElement('button');
      btn.className = 'manage-item-btn ' + (isVisible ? 'btn-rm-proj' : 'btn-add-proj');
      btn.textContent = isVisible ? 'еүҠйҷӨ' : 'иҝҪеҠ ';

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = '...';
        if (isVisible) {
          const { error } = await sb.from('denki_visible_projects').delete().eq('project_number', pn);
          if (error) { alert('еүҠйҷӨгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: ' + error.message); btn.disabled = false; btn.textContent = 'еүҠйҷӨ'; return; }
          visibleProjectNums.delete(pn);
        } else {
          const { error } = await sb.from('denki_visible_projects').insert({ project_number: pn });
          if (error) { alert('иҝҪеҠ гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: ' + error.message); btn.disabled = false; btn.textContent = 'иҝҪеҠ '; return; }
          visibleProjectNums.add(pn);
        }
        renderManageList();
        await refreshDisplay();
      });

      item.appendChild(info);
      item.appendChild(btn);
      list.appendChild(item);
    });
  }

  async function refreshDisplay() {
    showLoading();

    currentProjects = allAvailableProjects.filter(p => visibleProjectNums.has(String(p.project_number)));

    if (currentProjects.length > 0) {
      const linkedTexts   = PROCESSES.filter(p => p.linked).map(p => p.taskText);
      const projectNumbers = [...new Set(currentProjects.map(p => p.project_number))];

      const { data: linkedTasks } = await sb
        .from('tasks')
        .select('project_number, machine, text, start_date, end_date, owner, status')
        .in('project_number', projectNumbers)
        .in('text', linkedTexts);

      currentLinkedMap = {};
      (linkedTasks || []).forEach(t => {
        const key = `${t.project_number}__${t.machine}__${t.text}`;
        if (!currentLinkedMap[key]) currentLinkedMap[key] = { start_date: t.start_date, end_date: t.end_date, owner: t.owner || '', status: t.status || '' };
      });

      const { data: statusData } = await sb
        .from('denki_process_status')
        .select('project_number, machine, process_no, status, start_date, end_date, tantousha, memo')
        .in('project_number', projectNumbers);

      statusMap = {};
      (statusData || []).forEach(s => {
        statusMap[`${s.project_number}__${s.machine}__${s.process_no}`] = {
          status: s.status, start_date: s.start_date, end_date: s.end_date,
          tantousha: s.tantousha, memo: s.memo,
        };
      });
    } else {
      currentLinkedMap = {};
      statusMap = {};
    }

    if (currentProjects.length === 0) {
      document.getElementById('main-table').style.display = 'none';
      document.getElementById('no-data').style.display = 'block';
    } else {
      document.getElementById('no-data').style.display = 'none';
      renderTable(currentProjects, currentLinkedMap);
      document.getElementById('main-table').style.display = '';
    }

    if (ganttInitialized) {
      gantt.clearAll();
      const data = buildGanttData();
      if (data.data.length > 0) gantt.parse(data);
    }

    hideLoading();
  }

  function applyStatusStyle(dateTd, statusTd, statusSpan, status) {
    dateTd.classList.remove('proc-done', 'proc-na');
    statusTd.classList.remove('proc-done', 'proc-wip');
    statusSpan.className = 'status-label';
    statusSpan.textContent = status || '';
    statusSpan.style.display = status ? '' : 'none';
    switch (status) {
      case 'е®ҢдәҶ':
        dateTd.classList.add('proc-done');
        statusTd.classList.add('proc-done');
        statusSpan.classList.add('lbl-done');
        break;
      case 'дҪңжҘӯдёӯ':
        statusTd.classList.add('proc-wip');
        statusSpan.classList.add('lbl-wip');
        break;
      case 'еҜҫиұЎеӨ–':
        dateTd.classList.add('proc-na');
        statusSpan.classList.add('lbl-na');
        break;
    }
  }

  // в”Җв”Җв”Җ гӮӨгғігғ©гӮӨгғіз·ЁйӣҶ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function closeActiveInlineEdit() {
    if (!activeInlineEdit) return;
    activeInlineEdit.cancel();
    activeInlineEdit = null;
  }

  function editStatusCell(td, dateTd, proj, proc) {
    closeActiveInlineEdit();
    const key = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
    const rec = statusMap[key] || {};
    const origHTML = td.innerHTML;

    td.innerHTML = '';
    const sel = document.createElement('select');
    sel.className = 'inline-select';
    [['', 'в”Җ'], ['дҪңжҘӯдёӯ', 'дҪңжҘӯдёӯ'], ['е®ҢдәҶ', 'е®ҢдәҶ'], ['еҜҫиұЎеӨ–', 'еҜҫиұЎеӨ–']].forEach(([v, t]) => {
      const o = document.createElement('option');
      o.value = v; o.textContent = t;
      sel.appendChild(o);
    });
    sel.value = rec.status || '';
    td.appendChild(sel);
    sel.focus();

    const cancel = () => { td.innerHTML = origHTML; };
    activeInlineEdit = { cancel };

    sel.addEventListener('change', async () => {
      const newStatus = sel.value;
      activeInlineEdit = null;
      td.innerHTML = '';
      const newSpan = document.createElement('span');
      newSpan.className = 'status-label';
      applyStatusStyle(dateTd, td, newSpan, newStatus);
      td.appendChild(newSpan);
      const curRec = statusMap[key] || {};
      await saveRecord(proj.project_number, proj.machine || '', proc.no, {
        status: newStatus, start_date: curRec.start_date || null,
        end_date: curRec.end_date || null, tantousha: curRec.tantousha || null,
        memo: curRec.memo || null,
      });
      const isEmpty = !newStatus && !curRec.start_date && !curRec.end_date && !curRec.tantousha && !curRec.memo;
      if (isEmpty) delete statusMap[key];
      else statusMap[key] = { ...curRec, status: newStatus };
    });

    sel.addEventListener('blur', () => {
      setTimeout(() => {
        if (activeInlineEdit && activeInlineEdit.cancel === cancel) {
          cancel(); activeInlineEdit = null;
        }
      }, 100);
    });
  }

  function editOwnerCell(td, proj, proc) {

    const key = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
    const rec = statusMap[key] || {};
    const origHTML = td.innerHTML;

    td.innerHTML = '';

      newSpan.textContent = newOwner;
      td.appendChild(newSpan);

      if (isEmpty) delete statusMap[key];
      else statusMap[key] = { ...curRec, tantousha: newOwner };

  function toDBDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function ensureDatePicker() {
    if (datePicker) return;
    const anchor = document.getElementById('fp-anchor');
    const label  = document.getElementById('fp-range-label');
    datePicker = flatpickr(anchor, {
      mode: 'range',
      showMonths: 2,
      locale: 'ja',
      dateFormat: 'Y-m-d',
      disableMobile: true,
      onChange: (selectedDates) => {
        if (selectedDates.length === 1) {
          label.textContent = `й–Ӣе§Ӣж—Ҙ: ${toDBDate(selectedDates[0])}гҖҖзөӮдәҶж—Ҙ: йҒёжҠһдёӯ...`;
        } else if (selectedDates.length === 2) {
          label.textContent = `й–Ӣе§Ӣж—Ҙ: ${toDBDate(selectedDates[0])}гҖҖзөӮдәҶж—Ҙ: ${toDBDate(selectedDates[1])}`;
        }
      },
      onOpen: () => {
        label.style.display = 'block';
      },
      onClose: (selectedDates) => {
        label.style.display = 'none';
        activeInlineEdit = null;
        if (datePickerSave) {
          const newStart = selectedDates[0] ? toDBDate(selectedDates[0]) : null;
          const newEnd   = selectedDates[1] ? toDBDate(selectedDates[1]) : null;
          if (newStart || newEnd) datePickerSave(newStart, newEnd);
          datePickerSave = null;
        }
      },
    });
  }

  function editDateCell(td, proj, proc) {
    closeActiveInlineEdit();
    ensureDatePicker();

    const key = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
    const rec = statusMap[key] || {};

    // anchor гӮ’гӮ»гғ«гҒ®еҸідёҠгҒ«й…ҚзҪ®гҒ—гҒҰгӮ«гғ¬гғігғҖгғјгӮ’гҒқгҒ®дҪҚзҪ®гҒ«иЎЁзӨә
    const rect = td.getBoundingClientRect();
    const label = document.getElementById('fp-range-label');
    const anchor = document.getElementById('fp-anchor');
    anchor.style.top  = `${rect.top}px`;
    anchor.style.left = `${rect.right}px`;

    // гғ©гғҷгғ«гҒҜгӮ«гғ¬гғігғҖгғјгҒҢй–ӢгҒ„гҒҹеҫҢгҒ«дҪҚзҪ®гӮ’еҗҲгӮҸгҒӣгӮӢ
    const posLabel = () => {
      const cal = document.querySelector('.flatpickr-calendar.open');
      if (cal) {
        const cr = cal.getBoundingClientRect();
        label.style.top  = `${cr.top - 22}px`;
        label.style.left = `${cr.left}px`;
        label.style.width = `${cr.width}px`;
      }
    };
    requestAnimationFrame(posLabel);

    datePickerSave = async (newStart, newEnd) => {
      td.innerHTML = '';
      const newSpan = document.createElement('span');
      newSpan.textContent = fmtDate(newStart);
      td.appendChild(newSpan);
      const curRec = statusMap[key] || {};
      await saveRecord(proj.project_number, proj.machine || '', proc.no, {
        status: curRec.status || null, start_date: newStart,
        end_date: newEnd, tantousha: curRec.tantousha || null,
        memo: curRec.memo || null,
      });
      const isEmpty = !curRec.status && !newStart && !newEnd && !curRec.tantousha && !curRec.memo;
      if (isEmpty) delete statusMap[key];
      else statusMap[key] = { ...curRec, start_date: newStart, end_date: newEnd };
    };

    const defaultDates = [rec.start_date, rec.end_date].filter(Boolean);
    datePicker.setDate(defaultDates, false);
    const initLabel = defaultDates.length === 2
      ? `й–Ӣе§Ӣж—Ҙ: ${defaultDates[0]}гҖҖзөӮдәҶж—Ҙ: ${defaultDates[1]}`
      : defaultDates.length === 1 ? `й–Ӣе§Ӣж—Ҙ: ${defaultDates[0]}гҖҖзөӮдәҶж—Ҙ: жңӘиЁӯе®ҡ` : 'й–Ӣе§Ӣж—ҘгҒЁзөӮдәҶж—ҘгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';
    label.textContent = initLabel;

    datePicker.open();
    activeInlineEdit = { cancel: () => { datePickerSave = null; datePicker.close(); } };
  }

  async function saveRecord(projNum, machine, procNo, { status, start_date, end_date, tantousha, memo = null }) {
    const pn = String(projNum);
    const mc = machine || '';
    const isEmpty = !status && !start_date && !end_date && !tantousha && !memo;
    try {
      if (isEmpty) {
        await sb.from('denki_process_status').delete()
          .eq('project_number', pn).eq('machine', mc).eq('process_no', procNo);
      } else {
        await sb.from('denki_process_status').upsert(
          { project_number: pn, machine: mc, process_no: procNo,
            status: status || null, start_date, end_date, tantousha, memo: memo || null },
          { onConflict: 'project_number,machine,process_no' }
        );
      }
    } catch(e) { console.warn('дҝқеӯҳгӮЁгғ©гғј:', e); }
  }

  // в”Җв”Җв”Җ гӮ¬гғігғҲгғҒгғЈгғјгғҲ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function initGantt() {
    gantt.plugins({ marker: true });
    gantt.config.date_format = '%Y-%m-%d';
    gantt.config.scale_height = 48;
    gantt.config.row_height   = 28;
    gantt.config.task_height  = 18;
    gantt.config.min_column_width = 40;
    gantt.config.fit_tasks = false;
    gantt.config.drag_move    = false;
    gantt.config.drag_resize  = false;
    gantt.config.drag_progress = false;
    gantt.config.details_on_dblclick = false;

    gantt.config.scales = [
      { unit: 'month', step: 1, format: '%Yе№ҙ%mжңҲ' },
      { unit: 'week',  step: 1, format: d => `${d.getMonth()+1}/${d.getDate()}` },
    ];

    gantt.config.columns = [
      { name: 'text',   label: 'е·Ҙз•Ә / ж©ҹзЁ® / е·ҘзЁӢеҗҚ', width: 230, tree: true },
      { name: 'owner',  label: 'жӢ…еҪ“иҖ…', width: 90, align: 'center' },
      {
        name: 'start_disp', label: 'й–Ӣе§Ӣж—Ҙ', width: 85, align: 'center',
        template: t => t.type === gantt.config.types.project ? '' : fmtDate(t.start_date_str || ''),
      },
      {
        name: 'end_disp', label: 'зөӮдәҶж—Ҙ', width: 85, align: 'center',
        template: t => t.type === gantt.config.types.project ? '' : fmtDate(t.end_date_str || ''),
      },
    ];

    gantt.templates.task_class = (start, end, task) => {
      if (task.type === gantt.config.types.project) return 'gantt-project';
      return `gantt-${task.statusClass || 'pending'}`;
    };

    gantt.templates.task_text = (start, end, task) => {
      if (task.type === gantt.config.types.project) return '';
      return task.owner ? `<span style="font-size:10px">${task.owner}</span>` : '';
    };

    gantt.templates.tooltip_text = (start, end, task) => {
      if (task.type === gantt.config.types.project) return `<b>${task.text}</b>`;
      return `<b>${task.text}</b><br>` +
        `жӢ…еҪ“: ${task.owner || 'в”Җ'}<br>` +
        `зҠ¶ж…Ӣ: ${task.statusLabel || 'в”Җ'}<br>` +
        `й–Ӣе§Ӣ: ${fmtDate(task.start_date_str || '')}<br>` +
        `зөӮдәҶ: ${fmtDate(task.end_date_str || '')}`;
    };

    gantt.attachEvent('onBeforeLightbox', () => false);

    gantt.attachEvent('onTaskDblClick', (id) => {
      const task = gantt.getTask(id);
      if (!task || task.type === gantt.config.types.project) return false;
      openPopup({
        projNum:  task.projNum,
        machine:  task.machine,
        procNo:   task.procNo,
        procName: task.procName,
        source:   'gantt',
        ganttId:  id,
        dateTd: null, statusTd: null, statusSpan: null, ownerSpan: null, dateRangeSpan: null,
      });
      return false;
    });

    gantt.init('gantt-container');
  }

  let todayMarkerId = null;
  function updateTodayMarker() {
    if (todayMarkerId !== null) {
      try { gantt.deleteMarker(todayMarkerId); } catch(e) {}
    }
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    todayMarkerId = gantt.addMarker({
      start_date: today,
      css:   'today-line',
      title: 'д»Ҡж—Ҙ',
    });
  }

  function buildGanttData() {
    const tasks = [];

    currentProjects.forEach(proj => {
      const parentId = `${proj.project_number}__${proj.machine || ''}`;
      const children = [];

      PROCESSES.forEach(proc => {
        const key = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
        const rec = statusMap[key] || {};

        let startDate = rec.start_date;
        let endDate   = rec.end_date;

        // йҖЈжҗәе·ҘзЁӢгҒҜгғӘгғігӮҜж—Ҙд»ҳгӮ’гғ•гӮ©гғјгғ«гғҗгғғгӮҜ
        if (proc.linked) {
          const lk = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          if (!startDate) startDate = currentLinkedMap[lk]?.start_date;
          if (!endDate)   endDate   = currentLinkedMap[lk]?.end_date;
        }

        if (!startDate) return;

        const duration = endDate
          ? Math.max(1, Math.round((parseLocalDate(endDate) - parseLocalDate(startDate)) / 86400000) + 1)
          : 1;

        children.push({
          id:          `${parentId}__${proc.no}`,
          text:        `${proc.no}. ${proc.name}`,
          start_date:  startDate,
          duration,
          parent:      parentId,
          owner:       rec.tantousha || '',
          statusClass: getStatusClass(rec.status),
          statusLabel: rec.status || '',
          start_date_str: startDate,
          end_date_str:   endDate || null,
          projNum:  proj.project_number,
          machine:  proj.machine || '',
          procNo:   proc.no,
          procName: proc.name,
        });
      });

      if (children.length === 0) return;

      const earliest = children.reduce((m, t) => t.start_date < m ? t.start_date : m, children[0].start_date);

      tasks.push({
        id:         parentId,
        text:       `${proj.project_number}гҖҖ${proj.machine || ''}гҖҖ${proj.customer_name || ''}`,
        start_date: earliest,
        duration:   1,
        type:       gantt.config.types.project,
        open:       false,
      });
      tasks.push(...children);
    });

    return { data: tasks, links: [] };
  }

  function showGantt() {
    const container = document.getElementById('gantt-container');
    const toolbar   = document.getElementById('gantt-toolbar');
    const h = window.innerHeight - 44 - toolbar.offsetHeight;
    container.style.height = h + 'px';

    console.log('[Gantt] showGantt called, container height:', h);

    if (!ganttInitialized) {
      try {
        initGantt();
        ganttInitialized = true;
        console.log('[Gantt] initGantt OK');
      } catch(e) {
        console.error('[Gantt] initGantt ERROR:', e);
        return;
      }
    }

    gantt.clearAll();
    const data = buildGanttData();
    console.log('[Gantt] tasks count:', data.data.length, data.data.slice(0,3));

    if (data.data.length > 0) {
      gantt.parse(data);
      gantt.showDate(new Date());
    } else {
      gantt.render();
    }
    updateTodayMarker();
  }

  // в”Җв”Җв”Җ гӮ¬гғігғҲгғ„гғјгғ«гғҗгғј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let currentZoom = 'week';

  function setZoom(unit) {
    currentZoom = unit;
    ['zoom-day', 'zoom-week'].forEach(id => {
      document.getElementById(id).classList.toggle('zoom-active', id === `zoom-${unit}`);
    });
    if (unit === 'day') {
      gantt.config.scales = [
        { unit: 'month', step: 1, format: '%Yе№ҙ%mжңҲ' },
        { unit: 'day',   step: 1, format: '%d' },
      ];
      gantt.config.min_column_width = 40;
    } else if (unit === 'week') {
      gantt.config.scales = [
        { unit: 'month', step: 1, format: '%Yе№ҙ%mжңҲ' },
        { unit: 'week',  step: 1, format: d => `${d.getMonth()+1}/${d.getDate()}` },
      ];
      gantt.config.min_column_width = 40;
    }
    gantt.render();
  }

  document.getElementById('zoom-day').addEventListener('click',   () => setZoom('day'));
  document.getElementById('zoom-week').addEventListener('click',  () => setZoom('week'));
  document.getElementById('btn-today').addEventListener('click',  () => gantt.showDate(new Date()));

  // в”Җв”Җв”Җ и©ізҙ°гғ“гғҘгғј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function updateDetailButtons() {
    document.querySelectorAll('.btn-detail').forEach(btn => {
      const isOpen = currentDetailProjNum === String(btn.dataset.projNum);
      btn.innerHTML = isOpen ? SVG_COLLAPSE : SVG_EXPAND;
      btn.title     = isOpen ? 'дёҖиҰ§гҒ«жҲ»гӮӢ' : 'и©ізҙ°иЎЁзӨә';
    });
  }

  function openDetailView(projNum) {
    currentDetailProjNum = String(projNum);
    document.getElementById('view-table').style.display = 'none';
    document.getElementById('view-detail').style.display = 'block';
    renderDetailTable(projNum);
    updateDetailButtons();
  }

  function closeDetailView() {
    currentDetailProjNum = null;
    document.getElementById('view-detail').style.display = 'none';
    document.getElementById('view-table').style.display = '';
    updateDetailButtons();
  }

  function editDetailDateCell(tdStart, tdEnd, proj, proc) {
    closeActiveInlineEdit();
    ensureDatePicker();

    const key  = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
    const rec  = statusMap[key] || {};
    const rect = tdStart.getBoundingClientRect();
    const label  = document.getElementById('fp-range-label');
    const anchor = document.getElementById('fp-anchor');
    anchor.style.top  = `${rect.top}px`;
    anchor.style.left = `${rect.right}px`;

    const posLabel = () => {
      const cal = document.querySelector('.flatpickr-calendar.open');
      if (cal) {
        const cr = cal.getBoundingClientRect();
        label.style.top   = `${cr.top - 22}px`;
        label.style.left  = `${cr.left}px`;
        label.style.width = `${cr.width}px`;
      }
    };
    requestAnimationFrame(posLabel);

    datePickerSave = async (newStart, newEnd) => {
      tdStart.textContent = fmtDate(newStart);
      tdEnd.textContent   = fmtDate(newEnd);
      const curRec = statusMap[key] || {};
      await saveRecord(proj.project_number, proj.machine || '', proc.no, {
        status: curRec.status || null, start_date: newStart,
        end_date: newEnd, tantousha: curRec.tantousha || null,
        memo: curRec.memo || null,
      });
      const isEmpty = !curRec.status && !newStart && !newEnd && !curRec.tantousha && !curRec.memo;
      if (isEmpty) delete statusMap[key];
      else statusMap[key] = { ...curRec, start_date: newStart, end_date: newEnd };
    };

    const defaultDates = [rec.start_date, rec.end_date].filter(Boolean);
    datePicker.setDate(defaultDates, false);
    const initLabel = defaultDates.length === 2
      ? `й–Ӣе§Ӣж—Ҙ: ${defaultDates[0]}гҖҖзөӮдәҶж—Ҙ: ${defaultDates[1]}`
      : defaultDates.length === 1 ? `й–Ӣе§Ӣж—Ҙ: ${defaultDates[0]}гҖҖзөӮдәҶж—Ҙ: жңӘиЁӯе®ҡ` : 'й–Ӣе§Ӣж—ҘгҒЁзөӮдәҶж—ҘгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';
    label.textContent = initLabel;

    datePicker.open();
    activeInlineEdit = { cancel: () => { datePickerSave = null; datePicker.close(); } };
  }

  function renderDetailTable(projNum) {
    const projsForNum = currentProjects.filter(p => String(p.project_number) === String(projNum));
    if (projsForNum.length === 0) return;

    const pi0 = projsForNum[0];
    document.getElementById('detail-info-bar').textContent =
      `е·Ҙз•Ә: ${projNum}гҖҖе®ўе…Ҳ: ${pi0.customer_name || 'в”Җ'}`;

    const table = document.createElement('table');
    table.className = 'detail-table';
    const thead = document.createElement('thead');

    // гғҳгғғгғҖгғјиЎҢ1: ж©ҹзЁ®еҗҚпјҲеҗ„ж©ҹзЁ®гҒҜ3еҲ—: й–Ӣе§Ӣж—Ҙгғ»зөӮдәҶж—Ҙгғ»гғЎгғўпјү
    const htr1 = document.createElement('tr');
    const hthNo = document.createElement('th'); hthNo.className = 'col-no'; hthNo.rowSpan = 2; hthNo.textContent = 'No.'; htr1.appendChild(hthNo);
    const hthItem = document.createElement('th'); hthItem.className = 'col-item'; hthItem.rowSpan = 2; hthItem.textContent = 'е·ҘзЁӢеҗҚ'; htr1.appendChild(hthItem);
    projsForNum.forEach(proj => {
      const th = document.createElement('th');
      th.colSpan = 3;
      th.className = 'header-machine-group';
      th.textContent = `ж©ҹзЁ®: ${proj.machine || 'в”Җ'}`;
      htr1.appendChild(th);
    });
    thead.appendChild(htr1);

    // гғҳгғғгғҖгғјиЎҢ2: й–Ӣе§Ӣж—Ҙгғ»зөӮдәҶж—Ҙгғ»гғЎгғў
    const htr2 = document.createElement('tr');
    projsForNum.forEach(() => {
      ['й–Ӣе§Ӣж—Ҙ', 'зөӮдәҶж—Ҙ', 'гғЎгғў'].forEach(lbl => {
        const th = document.createElement('th');
        th.textContent = lbl;
        th.style.fontSize = '11px';
        htr2.appendChild(th);
      });
    });
    thead.appendChild(htr2);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    // еҗ„е·ҘзЁӢгӮ’3иЎҢгҒ§иЎЁзӨә
    PROCESSES.forEach(proc => {
      const deptClass = PROCESS_DEPT[proc.no] ? `dept-${PROCESS_DEPT[proc.no]}` : '';

      // Row1: No.(rs=3) | е·ҘзЁӢеҗҚ(rs=3) | й–Ӣе§Ӣж—Ҙ | зөӮдәҶж—Ҙ | гғЎгғў(rs=3)
      const trDate  = document.createElement('tr');
      if (deptClass) trDate.className = deptClass;

      const tdNo = document.createElement('td'); tdNo.className = 'col-no'; tdNo.rowSpan = 3; tdNo.textContent = proc.no;
      const tdItem = document.createElement('td'); tdItem.className = 'col-item'; tdItem.rowSpan = 3;
      if (proc.linked) tdItem.title = 'е…ЁдҪ“е·ҘзЁӢиЎЁгҒЁйҖЈжҗә';
      const nameSpan = document.createElement('span'); nameSpan.textContent = proc.name; tdItem.appendChild(nameSpan);
      if (PROCESS_FLOW[proc.no]) {
        tdItem.appendChild(document.createElement('br'));
        const flowSpan = document.createElement('span');
        flowSpan.textContent = PROCESS_FLOW[proc.no];
        flowSpan.style.fontSize = '11px';
        tdItem.appendChild(flowSpan);
      }
      trDate.appendChild(tdNo);
      trDate.appendChild(tdItem);

      // Row2: гӮ№гғҶгғјгӮҝгӮ№(cs=2)
      const trStat  = document.createElement('tr');
      trStat.className = (deptClass ? deptClass + ' ' : '') + 'detail-row-stat';

      // Row3: жӢ…еҪ“иҖ…(cs=2)
      const trOwner = document.createElement('tr');
      trOwner.className = (deptClass ? deptClass + ' ' : '') + 'detail-row-owner';

      projsForNum.forEach(proj => {
        const key = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
        const rec = statusMap[key] || {};

        let startDate, endDate, owner;
        if (proc.linked) {
          const lk = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          startDate = currentLinkedMap[lk]?.start_date || '';
          endDate   = currentLinkedMap[lk]?.end_date   || '';
          owner     = currentLinkedMap[lk]?.owner || '';
        } else {
          startDate = rec.start_date || '';
          endDate   = rec.end_date   || '';
          owner     = rec.tantousha  || '';
        }

        // Row1: й–Ӣе§Ӣж—Ҙ | зөӮдәҶж—Ҙ | гғЎгғў(rowspan=3)
        const tdStart = document.createElement('td');
        tdStart.className = 'detail-date' + (proc.linked ? ' linked' : '');
        tdStart.textContent = fmtDate(startDate);

        const tdEnd = document.createElement('td');
        tdEnd.className = 'detail-date' + (proc.linked ? ' linked' : '');
        tdEnd.textContent = fmtDate(endDate);

        const tdMemo = document.createElement('td');
        tdMemo.className = 'detail-memo-cell';
        tdMemo.rowSpan = 3;

        trDate.appendChild(tdStart);
        trDate.appendChild(tdEnd);
        trDate.appendChild(tdMemo);

        // Row2: гӮ№гғҶгғјгӮҝгӮ№(colspan=2)
        const tdStatus = document.createElement('td');
        tdStatus.className = 'detail-status';
        tdStatus.colSpan = 2;
        const statusSpan = document.createElement('span');
        statusSpan.className = 'status-label';
        if (proc.linked) {
          const lk = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          applyStatusStyle(tdStart, tdStatus, statusSpan, calcLinkedStatus(currentLinkedMap[lk]?.start_date, currentLinkedMap[lk]?.end_date));
        } else {
          applyStatusStyle(tdStart, tdStatus, statusSpan, rec.status || '');
        }
        tdStatus.appendChild(statusSpan);
        trStat.appendChild(tdStatus);

        // Row3: жӢ…еҪ“иҖ…(colspan=2)
        const tdOwner = document.createElement('td');
        tdOwner.className = 'detail-owner' + (proc.linked ? ' linked' : '');
        tdOwner.colSpan = 2;
        const ownerSpan = document.createElement('span');
        ownerSpan.textContent = owner;
        tdOwner.appendChild(ownerSpan);
        trOwner.appendChild(tdOwner);

        if (!proc.linked) {
          tdStart.addEventListener('dblclick', () => editDetailDateCell(tdStart, tdEnd, proj, proc));
          tdEnd.addEventListener('dblclick',   () => editDetailDateCell(tdStart, tdEnd, proj, proc));

          tdStatus.addEventListener('dblclick', () => editStatusCell(tdStatus, tdStart, proj, proc));

          tdOwner.addEventListener('dblclick', () => editOwnerCell(tdOwner, proj, proc));
        }

        const ta = document.createElement('textarea');
        ta.className   = 'detail-memo';
        ta.rows        = 3;
        ta.value       = rec.memo || '';
        ta.readOnly    = true;
        ta.addEventListener('dblclick', () => {
          ta._origMemo = ta.value;
          ta.readOnly  = false;
          ta.focus();
          ta.select();
        });
        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            ta.blur();
          }
          if (e.key === 'Escape') {
            ta.value    = ta._origMemo ?? (rec.memo || '');
            ta.readOnly = true;
            ta.blur();
          }
        });
        ta.addEventListener('blur', async () => {
          if (ta.readOnly) return;
          ta.readOnly = true;
          const newMemo = ta.value.trim() || null;
          const curRec  = statusMap[key] || {};
          if ((newMemo || null) === (curRec.memo || null)) return;
          await saveRecord(proj.project_number, proj.machine || '', proc.no, {
            status: curRec.status || null, start_date: curRec.start_date || null,
            end_date: curRec.end_date || null, tantousha: curRec.tantousha || null,
            memo: newMemo,
          });
          const isEmpty = !curRec.status && !curRec.start_date && !curRec.end_date && !curRec.tantousha && !newMemo;
          if (isEmpty) delete statusMap[key];
          else statusMap[key] = { ...curRec, memo: newMemo };
        });
        tdMemo.appendChild(ta);
      });

      tbody.appendChild(trDate);
      tbody.appendChild(trStat);
      tbody.appendChild(trOwner);
    });

    // еҮәиҚ·ж—ҘиЎҢпјҲ1иЎҢпјү
    const trShip1 = document.createElement('tr'); trShip1.className = 'row-shipping';

    const tdNoS   = document.createElement('td'); tdNoS.className = 'col-no'; tdNoS.textContent = '23';
    const tdItemS = document.createElement('td'); tdItemS.className = 'col-item'; tdItemS.textContent = 'е·Ҙе ҙеҮәиҚ·ж—Ҙ';
    trShip1.appendChild(tdNoS); trShip1.appendChild(tdItemS);

    projsForNum.forEach(proj => {
      const tdShip = document.createElement('td');
      tdShip.className = 'detail-date linked';
      tdShip.colSpan = 3;
      tdShip.textContent = fmtDate(proj.start_date);
      trShip1.appendChild(tdShip);
    });
    tbody.appendChild(trShip1);

    table.appendChild(tbody);
    const container = document.getElementById('detail-table-container');
    container.innerHTML = '';
    container.appendChild(table);
  }

  init();
</script>
