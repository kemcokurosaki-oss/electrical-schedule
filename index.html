<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電気工程確認表</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Meiryo', 'メイリオ', sans-serif;
      font-size: 12px;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 16px; font-weight: bold; }

    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #555;
    }
    #loading-overlay.visible { display: flex; }

    #table-gap {
      height: 16px;
      background: #f0f2f5;
    }

    #table-wrapper {
      overflow: auto;
      padding: 0 16px 16px 0;
      max-height: calc(100vh - 64px);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      border-top: 1px solid #bbb;
      border-left: 1px solid #bbb;
      white-space: nowrap;
      background: white;
    }

    th, td {
      border-right: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
      padding: 3px 6px;
      text-align: center;
      vertical-align: middle;
    }

    /* 固定列（No.・項目） */
    .col-no, .col-item {
      position: sticky;
      background: white;
      z-index: 10;
    }
    .col-no  { left: 0; min-width: 36px; max-width: 36px; }
    .col-item { left: 36px; min-width: 300px; max-width: 300px; text-align: left; }

    /* ヘッダー行 */
    thead tr th {
      background: #1a3a5c;
      color: white;
      font-weight: bold;
      position: sticky;
      z-index: 20;
    }
    thead tr:nth-child(1) th { top: 0; }
    thead tr:nth-child(2) th { top: 25px; }
    thead tr:nth-child(3) th { top: 50px; }

    thead th.col-no, thead th.col-item { z-index: 30; background: #1a3a5c; text-align: center; }

    /* 客先名ヘッダー */
    .header-client { background: #2c5282 !important; font-size: 11px; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    /* 工番ヘッダー */
    .header-number { background: #2d6a9f !important; }
    /* 機種ヘッダー */
    .header-machine { background: #3182ce !important; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }

    /* プロジェクト列 */
    td.cell-date {
      min-width: 90px;
      max-width: 90px;
      font-size: 11px;
      cursor: pointer;
    }
    td.cell-status {
      min-width: 90px;
      max-width: 90px;
      font-size: 10px;
      color: #555;
      cursor: pointer;
    }

    /* 工程行（日付行） */
    tr.row-date td { background: #fff; height: 32px; }
    tr.row-date td.col-no  { background: #f7fafc; font-weight: bold; }
    tr.row-date td.col-item { background: #f7fafc; }

    /* 担当者行 */
    tr.row-owner td { background: #f7fafc; border-top: none; height: 22px; }
    tr.row-owner td.col-no   { background: #edf2f7; }
    tr.row-owner td.col-item { background: #edf2f7; font-size: 10px; color: #666; }

    /* ステータス行 */
    tr.row-status td { background: #f7fafc; border-top: none; height: 22px; }
    tr.row-status td.col-no  { background: #edf2f7; }
    tr.row-status td.col-item { background: #edf2f7; font-size: 10px; color: #666; }

    /* 出荷日行 */
    tr.row-shipping td { background: #fffbeb; font-weight: bold; }
    tr.row-shipping td.col-no { background: #fef3c7; }
    tr.row-shipping td.col-item { background: #fef3c7; }
    tr.row-shipping td.cell-date { color: #b45309; font-size: 13px; }

    /* linked（全体工程表と連携）セル */
    td.linked { background: #ebf8ff; }

    /* ─── ステータスラベル ─────────────────────────────── */
    .status-label {
      display: inline-block;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 18px;
    }
    .status-label.lbl-wip  { background: #b7eb8f; color: #276749; }
    .status-label.lbl-done { background: #e2e8f0; color: #888; }
    .status-label.lbl-na   { color: #888; }

    /* 担当者ラベル */
    .owner-label {
      font-size: 10px;
      color: #555;
      margin-left: 3px;
    }
    td.proc-wip .owner-label { color: #276749; }
    td.proc-done .owner-label { color: #999; }

    /* 作業中: ステータスセル全体を塗りつぶし */
    tr.row-status td.proc-wip { background: #b7eb8f !important; }

    /* 完了: 日付セルグレーアウト */
    td.cell-date.proc-done {
      background: #e8e8e8 !important;
      color: #bbb;
    }
    tr.row-status td.proc-done { background: #e8e8e8 !important; }

    /* 対象外: 日付セルに斜線 */
    td.cell-date.proc-na { position: relative; overflow: hidden; }
    td.cell-date.proc-na::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 5px,
        rgba(100,100,100,0.3) 5px,
        rgba(100,100,100,0.3) 6px
      );
      pointer-events: none;
    }

    /* 空テーブル状態 */
    #no-data {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 14px;
    }

    /* ─── 編集ポップアップ ─────────────────────────────── */
    #edit-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
    }
    #edit-popup.active { display: flex; }

    .popup-box {
      background: white;
      border-radius: 8px;
      min-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .popup-header {
      background: #1a3a5c;
      color: white;
      padding: 12px 16px;
    }
    .popup-header .proc-name { font-weight: bold; font-size: 13px; }
    .popup-header .proj-info { font-size: 11px; color: #a0aec0; margin-top: 3px; }
    .popup-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .popup-field { display: flex; flex-direction: column; gap: 4px; }
    .popup-field label { font-size: 11px; color: #666; font-weight: bold; }
    .popup-field select,
    .popup-field input[type="date"] {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: 'Meiryo', 'メイリオ', sans-serif;
      background: white;
      width: 100%;
    }
    .popup-footer {
      padding: 10px 16px;
      background: #f7fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .popup-footer button {
      padding: 6px 18px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Meiryo', 'メイリオ', sans-serif;
    }
    #popup-cancel { background: #e2e8f0; color: #444; }
    #popup-save   { background: #1a3a5c; color: white; }
    #popup-save:hover { background: #2c5282; }
  </style>
</head>
<body>

<div id="loading-overlay" class="visible">読み込み中...</div>

<header>
  <h1>電気工程確認表</h1>
</header>

<!-- 編集ポップアップ -->
<div id="edit-popup">
  <div class="popup-box">
    <div class="popup-header">
      <div class="proc-name" id="popup-proc-name"></div>
      <div class="proj-info" id="popup-proj-info"></div>
    </div>
    <div class="popup-body">
      <div class="popup-field">
        <label>ステータス</label>
        <select id="popup-status">
          <option value="">─</option>
          <option value="作業中">作業中</option>
          <option value="完了">完了</option>
          <option value="対象外">対象外</option>
        </select>
      </div>
      <div class="popup-field">
        <label>開始日</label>
        <input type="date" id="popup-start">
      </div>
      <div class="popup-field">
        <label>終了日</label>
        <input type="date" id="popup-end">
      </div>
      <div class="popup-field">
        <label>担当者</label>
        <select id="popup-owner"></select>
      </div>
    </div>
    <div class="popup-footer">
      <button id="popup-cancel">キャンセル</button>
      <button id="popup-save">保存</button>
    </div>
  </div>
</div>

<div id="table-gap"></div>
<div id="table-wrapper">
  <div id="no-data" style="display:none">表示できるプロジェクトがありません</div>
  <table id="main-table" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  const S_URL = "https://dgekjzkrybrswsxlcbvh.supabase.co";
  const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZWtqemtyeWJyc3dzeGxjYnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODQ3MjIsImV4cCI6MjA4NDQ2MDcyMn0.BsEj53lV3p76yE9fMPTaLn7ocKTNzYPTqIAnBafYItU";
  const sb = supabase.createClient(S_URL, S_KEY);

  // ─── 工程定義 ───────────────────────────────────────────
  const PROCESSES = [
    { no:  1, name: '既設電気図面の入手',                           linked: false },
    { no:  2, name: 'リスト（モータ・電磁弁）出図',                 linked: false },
    { no:  3, name: '購入部品表（モータ・シリンダ）出図',           linked: false },
    { no:  4, name: '購入部品表（モータ・サーボ・インバータ等）出図', linked: false },
    { no:  5, name: 'エア回路図出図',                               linked: false },
    { no:  6, name: '油圧回路図出図',                               linked: false },
    { no:  7, name: '運転方案（センサ選定）',                       linked: false },
    { no:  8, name: '先行手配（PLC等）',                            linked: false },
    { no:  9, name: '機器リスト出図',                               linked: false },
    { no: 10, name: '機器リスト確認',                               linked: false },
    { no: 11, name: '操作盤外形図出図',                             linked: false },
    { no: 12, name: '操作盤外形図確認',                             linked: false },
    { no: 13, name: '電気図面出図',                                 linked: true,  taskText: '電気図面出図' },
    { no: 14, name: '部品手配',                                     linked: true,  taskText: '部品手配' },
    { no: 15, name: '確認用電気図出図（事前見積り用）',             linked: false },
    { no: 16, name: '確認用電気図確認',                             linked: false },
    { no: 17, name: '最終電気図出図',                               linked: true,  taskText: '最終電気図面' },
    { no: 18, name: '部品（板金含む）入荷',                         linked: false },
    { no: 19, name: '電気艤装開始日',                               linked: true,  taskText: '電気艤装' },
    { no: 20, name: '盤組開始日',                                   linked: true,  taskText: '盤組立' },
    { no: 21, name: '盤立ち上げ',                                   linked: false },
    { no: 22, name: '試運転開始日',                                 linked: true,  taskText: '試運転' },
  ];

  // ─── 担当者マスター ─────────────────────────────────────
  const DEPT_OWNERS = {
    営業: ['専務', '銭', '麻生', '原田', '岡本', '津村', '前川', '池田', '展久'],
    設計: ['藤山', '田中(善)', '安岡', '川邊', '檀', '堀井', '宮﨑', '津田', '古村', '柴田', '橋本', '松本(英)'],
    電技: ['松本(幹)', '秋藤'],
    操業: ['堀尾', '黒見', '大西(元)', '大西(優)', '木本', '前田', '本郷', '大重', '外注'],
    電装: ['木村(至)', '木村(圭)', '守時', '外注'],
  };
  const ALL_OWNERS = [
    ...DEPT_OWNERS.営業,
    ...DEPT_OWNERS.設計,
    ...DEPT_OWNERS.電技,
    ...DEPT_OWNERS.操業,
    ...DEPT_OWNERS.電装,
  ];
  const PROCESS_OWNERS = {
     1: DEPT_OWNERS.営業,
     2: DEPT_OWNERS.設計,
     3: DEPT_OWNERS.設計,
     4: DEPT_OWNERS.電技,
     5: DEPT_OWNERS.設計,
     6: DEPT_OWNERS.設計,
     7: ALL_OWNERS,
     8: DEPT_OWNERS.電技,
     9: DEPT_OWNERS.電技,
    10: DEPT_OWNERS.設計,
    11: DEPT_OWNERS.電技,
    12: DEPT_OWNERS.操業,
    13: DEPT_OWNERS.電技,
    14: DEPT_OWNERS.電技,
    15: DEPT_OWNERS.電技,
    16: DEPT_OWNERS.電装,
    17: DEPT_OWNERS.電技,
    18: DEPT_OWNERS.電技,
    19: DEPT_OWNERS.電装,
    20: DEPT_OWNERS.電装,
    21: DEPT_OWNERS.操業,
    22: DEPT_OWNERS.操業,
  };

  // ─── モジュールレベルの状態 ──────────────────────────────
  let statusMap = {}; // "projNum__machine__procNo" → { status, start_date, end_date, tantousha }
  let editCtx = null;

  // ─── 日付フォーマット ─────────────────────────────────
  function fmtDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    return `${String(d.getFullYear()).slice(-2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }

  function fmtDateRange(start, end) {
    const s = fmtDate(start);
    const e = fmtDate(end);
    if (s && e) return `${s}～${e}`;
    if (s) return `${s}～`;
    return '';
  }

  // ─── ポップアップ操作 ─────────────────────────────────
  function openPopup({ projNum, machine, procNo, procName, dateTd, statusTd, statusSpan, ownerSpan, dateRangeSpan }) {
    const key = `${projNum}__${machine}__${procNo}`;
    const rec = statusMap[key] || {};

    document.getElementById('popup-proc-name').textContent = `No.${procNo}　${procName}`;
    document.getElementById('popup-proj-info').textContent = `工番: ${projNum}　機種: ${machine || '─'}`;
    document.getElementById('popup-status').value = rec.status || '';
    document.getElementById('popup-start').value  = rec.start_date || '';
    document.getElementById('popup-end').value    = rec.end_date   || '';

    const ownerSel = document.getElementById('popup-owner');
    ownerSel.innerHTML = '<option value="">─</option>';
    (PROCESS_OWNERS[procNo] || []).forEach(name => {
      const o = document.createElement('option');
      o.value = name;
      o.textContent = name;
      ownerSel.appendChild(o);
    });
    ownerSel.value = rec.tantousha || '';

    editCtx = { projNum, machine, procNo, key, dateTd, statusTd, statusSpan, ownerSpan, dateRangeSpan };
    document.getElementById('edit-popup').classList.add('active');
  }

  function closePopup() {
    document.getElementById('edit-popup').classList.remove('active');
    editCtx = null;
  }

  // 背景クリックで閉じる
  document.getElementById('edit-popup').addEventListener('click', e => {
    if (e.target === document.getElementById('edit-popup')) closePopup();
  });

  document.getElementById('popup-cancel').addEventListener('click', closePopup);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePopup();
  });

  document.getElementById('popup-save').addEventListener('click', async () => {
    if (!editCtx) return;

    const status    = document.getElementById('popup-status').value;
    const start_date = document.getElementById('popup-start').value || null;
    const end_date   = document.getElementById('popup-end').value   || null;
    const tantousha  = document.getElementById('popup-owner').value || null;

    await saveRecord(editCtx.projNum, editCtx.machine, editCtx.procNo, { status, start_date, end_date, tantousha });

    // statusMap 更新
    const isEmpty = !status && !start_date && !end_date && !tantousha;
    if (isEmpty) {
      delete statusMap[editCtx.key];
    } else {
      statusMap[editCtx.key] = { status, start_date, end_date, tantousha };
    }

    // DOM 更新
    applyStatusStyle(editCtx.dateTd, editCtx.statusTd, editCtx.statusSpan, status);
    if (editCtx.ownerSpan)     editCtx.ownerSpan.textContent = tantousha || '';
    if (editCtx.dateRangeSpan) editCtx.dateRangeSpan.textContent = fmtDateRange(start_date, end_date);

    closePopup();
  });

  // ─── メイン処理 ───────────────────────────────────────
  async function init() {
    // 1. 完了済み工番を取得
    const { data: completedData } = await sb
      .from('completed_projects')
      .select('project_number');
    const completedNums = new Set((completedData || []).map(c => String(c.project_number)));

    // 2. プロジェクト一覧を取得（工場出荷タスクから）
    const { data: shipTasks, error: e1 } = await sb
      .from('tasks')
      .select('project_number, machine, customer_name, start_date')
      .eq('text', '工場出荷')
      .order('project_number', { ascending: true });

    if (e1) { console.error(e1); hideLoading(); return; }

    // 重複排除＋完了済みを除外
    const seen = new Set();
    const projects = (shipTasks || []).filter(p => {
      if (completedNums.has(String(p.project_number))) return false;
      const key = `${p.project_number}__${p.machine}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    if (projects.length === 0) {
      hideLoading();
      document.getElementById('no-data').style.display = 'block';
      return;
    }

    // 3. 連携工程の日付を一括取得
    const linkedTexts = PROCESSES.filter(p => p.linked).map(p => p.taskText);
    const projectNumbers = [...new Set(projects.map(p => p.project_number))];

    const { data: linkedTasks } = await sb
      .from('tasks')
      .select('project_number, machine, text, start_date')
      .in('project_number', projectNumbers)
      .in('text', linkedTexts);

    const linkedMap = {};
    (linkedTasks || []).forEach(t => {
      const key = `${t.project_number}__${t.machine}__${t.text}`;
      if (!linkedMap[key]) linkedMap[key] = t.start_date;
    });

    // customer_name が空の工番を補完
    const { data: custData } = await sb
      .from('tasks')
      .select('project_number, customer_name')
      .in('project_number', projectNumbers)
      .not('customer_name', 'is', null);
    const custMap = {};
    (custData || []).forEach(t => {
      if (t.customer_name && !custMap[t.project_number]) custMap[t.project_number] = t.customer_name;
    });
    projects.forEach(p => {
      if (!p.customer_name) p.customer_name = custMap[p.project_number];
    });

    // 4. 進捗状況を取得（新カラム含む）
    statusMap = {};
    try {
      const { data: statusData } = await sb
        .from('denki_process_status')
        .select('project_number, machine, process_no, status, start_date, end_date, tantousha');
      (statusData || []).forEach(s => {
        statusMap[`${s.project_number}__${s.machine}__${s.process_no}`] = {
          status:     s.status,
          start_date: s.start_date,
          end_date:   s.end_date,
          tantousha:  s.tantousha,
        };
      });
    } catch(e) { /* テーブル未作成の場合は無視 */ }

    // 5. 描画
    renderTable(projects, linkedMap);
    document.getElementById('main-table').style.display = '';
    hideLoading();
  }

  function renderTable(projects, linkedMap) {
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');

    // ─── ヘッダー（3行）───
    const projectGroups = [];
    let prevNum = null;
    projects.forEach(p => {
      if (p.project_number === prevNum) {
        projectGroups[projectGroups.length - 1].count++;
      } else {
        projectGroups.push({ project_number: p.project_number, customer_name: p.customer_name, count: 1 });
        prevNum = p.project_number;
      }
    });

    thead.innerHTML = '';

    // 行1: 客先名
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = '客先'; tr.appendChild(thItem);
      projectGroups.forEach(g => {
        const th = document.createElement('th');
        th.className = 'header-client';
        th.textContent = g.customer_name || '─';
        if (g.customer_name) th.title = g.customer_name;
        if (g.count > 1) th.colSpan = g.count;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // 行2: 工番
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = '工番'; tr.appendChild(thItem);
      projectGroups.forEach(g => {
        const th = document.createElement('th');
        th.className = 'header-number';
        th.textContent = g.project_number;
        if (g.count > 1) th.colSpan = g.count;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // 行3: 機種
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = '機種'; tr.appendChild(thItem);
      projects.forEach(p => {
        const th = document.createElement('th');
        th.className = 'header-machine';
        th.textContent = p.machine || '─';
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // ─── ボディ（工程行）───
    tbody.innerHTML = '';

    PROCESSES.forEach(proc => {
      // 日付行
      const trDate = document.createElement('tr');
      trDate.className = 'row-date';

      const tdNo = document.createElement('td');
      tdNo.className = 'col-no';
      tdNo.textContent = proc.no;
      trDate.appendChild(tdNo);

      const tdItem = document.createElement('td');
      tdItem.className = 'col-item';
      tdItem.textContent = proc.name;
      if (proc.linked) tdItem.title = '全体工程表と連携';
      trDate.appendChild(tdItem);

      const dateTds = [];
      const dateRangeSpans = [];

      projects.forEach(proj => {
        const td = document.createElement('td');
        td.className = 'cell-date' + (proc.linked ? ' linked' : '');
        td.title = 'ダブルクリックで編集';

        if (proc.linked) {
          // 連携工程: 全体工程表の日付を表示
          const key = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          td.textContent = fmtDate(linkedMap[key]);
          dateRangeSpans.push(null);
        } else {
          // 非連携工程: ローカルの start_date ～ end_date を表示
          const statusKey = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
          const rec = statusMap[statusKey] || {};
          const span = document.createElement('span');
          span.textContent = fmtDateRange(rec.start_date, rec.end_date);
          td.appendChild(span);
          dateRangeSpans.push(span);
        }

        dateTds.push(td);
        trDate.appendChild(td);
      });

      tbody.appendChild(trDate);

      // ステータス行
      const trStatus = document.createElement('tr');
      trStatus.className = 'row-status';

      const tdNoS = document.createElement('td');
      tdNoS.className = 'col-no';
      trStatus.appendChild(tdNoS);

      const tdItemS = document.createElement('td');
      tdItemS.className = 'col-item';
      trStatus.appendChild(tdItemS);

      projects.forEach((proj, pi) => {
        const statusKey = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
        const rec = statusMap[statusKey] || {};
        const dateTd = dateTds[pi];

        const td = document.createElement('td');
        td.className = 'cell-status';
        td.title = 'ダブルクリックで編集';

        const statusSpan = document.createElement('span');
        statusSpan.className = 'status-label';

        const ownerSpan = document.createElement('span');
        ownerSpan.className = 'owner-label';
        ownerSpan.textContent = rec.tantousha || '';

        applyStatusStyle(dateTd, td, statusSpan, rec.status || '');

        td.appendChild(statusSpan);
        td.appendChild(ownerSpan);

        const openEdit = () => openPopup({
          projNum:       proj.project_number,
          machine:       proj.machine || '',
          procNo:        proc.no,
          procName:      proc.name,
          dateTd,
          statusTd:      td,
          statusSpan,
          ownerSpan,
          dateRangeSpan: dateRangeSpans[pi],
        });

        td.addEventListener('dblclick', openEdit);
        dateTd.addEventListener('dblclick', openEdit);

        trStatus.appendChild(td);
      });

      tbody.appendChild(trStatus);
    });

    // ─── 出荷日行 ───
    const trShip = document.createElement('tr');
    trShip.className = 'row-shipping';

    const tdNoShip = document.createElement('td');
    tdNoShip.className = 'col-no';
    tdNoShip.textContent = '23';
    trShip.appendChild(tdNoShip);

    const tdItemShip = document.createElement('td');
    tdItemShip.className = 'col-item';
    tdItemShip.textContent = '工場出荷日';
    trShip.appendChild(tdItemShip);

    projects.forEach(proj => {
      const td = document.createElement('td');
      td.className = 'cell-date linked';
      td.textContent = fmtDate(proj.start_date);
      trShip.appendChild(td);
    });

    tbody.appendChild(trShip);
  }

  function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('visible');
  }

  function applyStatusStyle(dateTd, statusTd, statusSpan, status) {
    dateTd.classList.remove('proc-done', 'proc-na');
    statusTd.classList.remove('proc-done', 'proc-wip');
    statusSpan.className = 'status-label';
    statusSpan.textContent = status || '';
    statusSpan.style.display = status ? '' : 'none';

    switch (status) {
      case '完了':
        dateTd.classList.add('proc-done');
        statusTd.classList.add('proc-done');
        statusSpan.classList.add('lbl-done');
        break;
      case '作業中':
        statusTd.classList.add('proc-wip');
        statusSpan.classList.add('lbl-wip');
        break;
      case '対象外':
        dateTd.classList.add('proc-na');
        statusSpan.classList.add('lbl-na');
        break;
    }
  }

  async function saveRecord(projNum, machine, procNo, { status, start_date, end_date, tantousha }) {
    const pn = String(projNum);
    const mc = machine || '';
    const isEmpty = !status && !start_date && !end_date && !tantousha;

    try {
      if (isEmpty) {
        await sb.from('denki_process_status')
          .delete()
          .eq('project_number', pn)
          .eq('machine', mc)
          .eq('process_no', procNo);
      } else {
        await sb.from('denki_process_status').upsert(
          { project_number: pn, machine: mc, process_no: procNo, status: status || null, start_date, end_date, tantousha },
          { onConflict: 'project_number,machine,process_no' }
        );
      }
    } catch(e) {
      console.warn('保存エラー:', e);
    }
  }

  init();
</script>
</body>
</html>
