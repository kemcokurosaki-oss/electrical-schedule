<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電気工程確認表</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Meiryo', 'メイリオ', sans-serif;
      font-size: 12px;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 16px; font-weight: bold; }

    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #555;
    }
    #loading-overlay.visible { display: flex; }

    #table-gap {
      height: 16px;
      background: #f0f2f5;
    }

    #table-wrapper {
      overflow: auto;
      padding: 0 16px 16px 0;
      max-height: calc(100vh - 64px);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      border-top: 1px solid #bbb;
      border-left: 1px solid #bbb;
      white-space: nowrap;
      background: white;
    }

    th, td {
      border-right: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
      padding: 3px 6px;
      text-align: center;
      vertical-align: middle;
    }

    /* 固定列（No.・項目） */
    .col-no, .col-item {
      position: sticky;
      background: white;
      z-index: 10;
    }
    .col-no  { left: 0; min-width: 36px; max-width: 36px; }
    .col-item { left: 36px; min-width: 300px; max-width: 300px; text-align: left; }

    /* ヘッダー行 */
    thead tr th {
      background: #1a3a5c;
      color: white;
      font-weight: bold;
      position: sticky;
      z-index: 20;
    }
    thead tr:nth-child(1) th { top: 0; }
    thead tr:nth-child(2) th { top: 25px; }
    thead tr:nth-child(3) th { top: 50px; }

    thead th.col-no, thead th.col-item { z-index: 30; background: #1a3a5c; text-align: center; }

    /* 客先名ヘッダー */
    .header-client { background: #2c5282 !important; font-size: 11px; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    /* 工番ヘッダー */
    .header-number { background: #2d6a9f !important; }
    /* 機種ヘッダー */
    .header-machine { background: #3182ce !important; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }

    /* プロジェクト列 */
    td.cell-date {
      min-width: 90px;
      max-width: 90px;
      font-size: 13px;
      cursor: pointer;
    }
    td.cell-status {
      min-width: 90px;
      max-width: 90px;
      font-size: 10px;
      color: #555;
    }

    /* 工程行（日付行） */
    tr.row-date td { background: #fff; height: 32px; }
    tr.row-date td.col-no  { background: #f7fafc; font-weight: bold; }
    tr.row-date td.col-item { background: #f7fafc; }

    /* ステータス行 */
    tr.row-status td { background: #f7fafc; border-top: none; height: 20px; }
    tr.row-status td.col-no  { background: #edf2f7; }
    tr.row-status td.col-item { background: #edf2f7; font-size: 10px; color: #666; }

    /* 出荷日行 */
    tr.row-shipping td { background: #fffbeb; font-weight: bold; }
    tr.row-shipping td.col-no { background: #fef3c7; }
    tr.row-shipping td.col-item { background: #fef3c7; }
    tr.row-shipping td.cell-date { color: #b45309; }

    /* linked（全体工程表と連携）セル */
    td.linked { background: #ebf8ff; }

    /* ステータス色 */
    .status-done    { color: #2f855a; font-weight: bold; }
    .status-wip     { color: #2b6cb0; font-weight: bold; }
    .status-na      { color: #999; }
    .status-pending { color: #c05621; }

    /* ─── 進捗プルダウン ─────────────────────────────── */
    tr.row-status td { height: 24px; }

    td.cell-status { padding: 2px; cursor: default; }

    /* 通常表示: ステータスラベル */
    .status-label {
      display: inline-block;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      line-height: 18px;
      cursor: default;
    }
    .status-label.lbl-wip  { background: #9ae6b4; color: #276749; }
    .status-label.lbl-done { background: #e2e8f0; color: #888; }
    .status-label.lbl-na   { color: #888; }

    /* 編集時: プルダウン */
    select.status-select {
      display: none;
      width: 86px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #f9f9f9;
      font-size: 12px;
      cursor: pointer;
      padding: 1px 2px;
      font-family: 'Meiryo', 'メイリオ', sans-serif;
      outline: none;
      height: 22px;
    }
    select.status-select.sel-wip  { background: #9ae6b4; }
    select.status-select.sel-done { background: #e2e8f0; color: #999; }

    /* 完了: 日付セルグレーアウト */
    td.cell-date.proc-done {
      background: #e8e8e8 !important;
      color: #bbb;
    }
    tr.row-status td.proc-done { background: #e8e8e8 !important; }

    /* 対象外: 日付セルに斜線（疑似要素で重ね描き） */
    td.cell-date.proc-na { position: relative; overflow: hidden; }
    td.cell-date.proc-na::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 5px,
        rgba(100,100,100,0.3) 5px,
        rgba(100,100,100,0.3) 6px
      );
      pointer-events: none;
    }

    /* 空テーブル状態 */
    #no-data {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="loading-overlay" class="visible">読み込み中...</div>

<header>
  <h1>電気工程確認表</h1>
</header>

<div id="table-gap"></div>
<div id="table-wrapper">
  <div id="no-data" style="display:none">表示できるプロジェクトがありません</div>
  <table id="main-table" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  const S_URL = "https://dgekjzkrybrswsxlcbvh.supabase.co";
  const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZWtqemtyeWJyc3dzeGxjYnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODQ3MjIsImV4cCI6MjA4NDQ2MDcyMn0.BsEj53lV3p76yE9fMPTaLn7ocKTNzYPTqIAnBafYItU";
  const sb = supabase.createClient(S_URL, S_KEY);

  // ─── 工程定義 ───────────────────────────────────────────
  // linked: true の工程は tasks テーブルから日付を取得（全体工程表と連携）
  // taskText: tasks.text の対応する値（連携時に使用）
  const PROCESSES = [
    { no:  1, name: '既設電気図面の入手',                      linked: false },
    { no:  2, name: 'リスト（モータ・電磁弁）出図',            linked: false },
    { no:  3, name: '購入部品表（モータ・シリンダ）出図',      linked: false },
    { no:  4, name: '購入部品表（モータ・サーボ・インバータ等）出図', linked: false },
    { no:  5, name: 'エア回路図出図',                          linked: false },
    { no:  6, name: '油圧回路図出図',                          linked: false },
    { no:  7, name: '運転方案（センサ選定）',                  linked: false },
    { no:  8, name: '先行手配（PLC等）',                       linked: false },
    { no:  9, name: '機器リスト出図',                          linked: false },
    { no: 10, name: '機器リスト確認',                          linked: false },
    { no: 11, name: '操作盤外形図出図',                        linked: false },
    { no: 12, name: '操作盤外形図確認',                        linked: false },
    { no: 13, name: '電気図面出図',                            linked: true,  taskText: '電気図面出図' },
    { no: 14, name: '部品手配',                                linked: true,  taskText: '部品手配' },
    { no: 15, name: '確認用電気図出図（事前見積り用）',        linked: false },
    { no: 16, name: '確認用電気図確認',                        linked: false },
    { no: 17, name: '最終電気図出図',                          linked: true,  taskText: '最終電気図面' },
    { no: 18, name: '部品（板金含む）入荷',                    linked: false },
    { no: 19, name: '電気艤装開始日',                          linked: true,  taskText: '電気艤装' },
    { no: 20, name: '盤組開始日',                              linked: true,  taskText: '盤組立' },
    { no: 21, name: '盤立ち上げ',                              linked: false },
    { no: 22, name: '試運転開始日',                            linked: true,  taskText: '試運転' },
  ];

  // ─── 日付フォーマット ─────────────────────────────────
  function fmtDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    return `${String(d.getFullYear()).slice(-2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }

  // ─── メイン処理 ───────────────────────────────────────
  async function init() {
    // 1. 完了済み工番を取得
    const { data: completedData } = await sb
      .from('completed_projects')
      .select('project_number');
    const completedNums = new Set((completedData || []).map(c => String(c.project_number)));

    // 2. プロジェクト一覧を取得（工場出荷タスクから）
    const { data: shipTasks, error: e1 } = await sb
      .from('tasks')
      .select('project_number, machine, customer_name, start_date')
      .eq('text', '工場出荷')
      .order('project_number', { ascending: true });

    if (e1) { console.error(e1); hideLoading(); return; }

    // 重複排除（同工番・同機種の最初の1件）＋完了済みを除外
    const seen = new Set();
    const projects = (shipTasks || []).filter(p => {
      if (completedNums.has(String(p.project_number))) return false;
      const key = `${p.project_number}__${p.machine}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    if (projects.length === 0) {
      hideLoading();
      document.getElementById('no-data').style.display = 'block';
      return;
    }

    // 2. 連携工程の日付を一括取得
    const linkedTexts = PROCESSES.filter(p => p.linked).map(p => p.taskText);
    const projectNumbers = [...new Set(projects.map(p => p.project_number))];

    const { data: linkedTasks } = await sb
      .from('tasks')
      .select('project_number, machine, text, start_date')
      .in('project_number', projectNumbers)
      .in('text', linkedTexts);

    // project_number + machine + text → start_date のマップ
    const linkedMap = {};
    (linkedTasks || []).forEach(t => {
      const key = `${t.project_number}__${t.machine}__${t.text}`;
      if (!linkedMap[key]) linkedMap[key] = t.start_date;
    });

    // customer_name が空の工番を同工番の全タスクから補完
    const { data: custData } = await sb
      .from('tasks')
      .select('project_number, customer_name')
      .in('project_number', projectNumbers)
      .not('customer_name', 'is', null);
    const custMap = {};
    (custData || []).forEach(t => {
      if (t.customer_name && !custMap[t.project_number]) custMap[t.project_number] = t.customer_name;
    });
    projects.forEach(p => {
      if (!p.customer_name) p.customer_name = custMap[p.project_number];
    });

    // 3. 進捗状況を取得
    let statusMap = {};
    try {
      const { data: statusData } = await sb
        .from('denki_process_status')
        .select('project_number, machine, process_no, status');
      (statusData || []).forEach(s => {
        statusMap[`${s.project_number}__${s.machine}__${s.process_no}`] = s.status;
      });
    } catch(e) { /* テーブル未作成の場合は無視 */ }

    // 4. 描画
    renderTable(projects, linkedMap, statusMap);
    document.getElementById('main-table').style.display = '';
    hideLoading();
  }

  function renderTable(projects, linkedMap, statusMap = {}) {
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');

    // ─── ヘッダー（3行）───
    // 同じ工番を連続グループとしてまとめる（colspan結合用）
    const projectGroups = [];
    let prevNum = null;
    projects.forEach((p, i) => {
      if (p.project_number === prevNum) {
        projectGroups[projectGroups.length - 1].count++;
      } else {
        projectGroups.push({ project_number: p.project_number, customer_name: p.customer_name, count: 1 });
        prevNum = p.project_number;
      }
    });

    thead.innerHTML = '';

    // 行1: 客先名（同じ工番のグループを結合）
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = '客先'; tr.appendChild(thItem);
      projectGroups.forEach(g => {
        const th = document.createElement('th');
        th.className = 'header-client';
        th.textContent = g.customer_name || '─';
        if (g.customer_name) th.title = g.customer_name;
        if (g.count > 1) th.colSpan = g.count;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // 行2: 工番（同じ工番のグループを結合）
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = '工番'; tr.appendChild(thItem);
      projectGroups.forEach(g => {
        const th = document.createElement('th');
        th.className = 'header-number';
        th.textContent = g.project_number;
        if (g.count > 1) th.colSpan = g.count;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // 行3: 機種（各機種は個別セル）
    {
      const tr = document.createElement('tr');
      const thNo = document.createElement('th'); thNo.className = 'col-no'; tr.appendChild(thNo);
      const thItem = document.createElement('th'); thItem.className = 'col-item'; thItem.textContent = '機種'; tr.appendChild(thItem);
      projects.forEach(p => {
        const th = document.createElement('th');
        th.className = 'header-machine';
        th.textContent = p.machine || '─';
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    // ─── ボディ（工程行）───
    tbody.innerHTML = '';

    PROCESSES.forEach(proc => {
      // 日付行
      const trDate = document.createElement('tr');
      trDate.className = 'row-date';

      const tdNo = document.createElement('td');
      tdNo.className = 'col-no';
      tdNo.textContent = proc.no;
      trDate.appendChild(tdNo);

      const tdItem = document.createElement('td');
      tdItem.className = 'col-item';
      tdItem.textContent = proc.name;
      if (proc.linked) tdItem.title = '全体工程表と連携';
      trDate.appendChild(tdItem);

      const dateTds = [];
      projects.forEach(proj => {
        const td = document.createElement('td');
        td.className = 'cell-date' + (proc.linked ? ' linked' : '');
        if (proc.linked) {
          const key = `${proj.project_number}__${proj.machine}__${proc.taskText}`;
          td.textContent = fmtDate(linkedMap[key]);
        }
        dateTds.push(td);
        trDate.appendChild(td);
      });

      tbody.appendChild(trDate);

      // ステータス行
      const trStatus = document.createElement('tr');
      trStatus.className = 'row-status';

      const tdNoS = document.createElement('td');
      tdNoS.className = 'col-no';
      trStatus.appendChild(tdNoS);

      const tdItemS = document.createElement('td');
      tdItemS.className = 'col-item';
      tdItemS.textContent = '';
      trStatus.appendChild(tdItemS);

      projects.forEach((proj, pi) => {
        const statusKey = `${proj.project_number}__${proj.machine || ''}__${proc.no}`;
        const currentStatus = statusMap[statusKey] || '';
        const dateTd = dateTds[pi];

        const td = document.createElement('td');
        td.className = 'cell-status';
        td.title = 'ダブルクリックで進捗変更';

        // 通常表示ラベル（未選択時は非表示）
        const span = document.createElement('span');
        span.className = 'status-label';
        span.style.display = currentStatus ? '' : 'none';

        // プルダウン（デフォルト非表示）
        const sel = document.createElement('select');
        sel.className = 'status-select';

        ['', '作業中', '完了', '対象外'].forEach(opt => {
          const o = document.createElement('option');
          o.value = opt;
          o.textContent = opt || '─';
          sel.appendChild(o);
        });
        sel.value = currentStatus;
        applyStatusStyle(dateTd, td, sel, span, currentStatus);

        // ダブルクリックでプルダウン表示
        td.addEventListener('dblclick', () => {
          span.style.display = 'none';
          sel.style.display = '';
          sel.focus();
          try { sel.showPicker(); } catch(e) {}
        });

        // 選択後: ラベル更新してプルダウン非表示
        sel.addEventListener('change', () => {
          const newStatus = sel.value;
          applyStatusStyle(dateTd, td, sel, span, newStatus);
          sel.style.display = 'none';
          span.style.display = newStatus ? '' : 'none';
          saveStatus(proj.project_number, proj.machine, proc.no, newStatus);
        });

        // フォーカスが外れたら閉じる
        sel.addEventListener('blur', () => {
          sel.style.display = 'none';
          span.style.display = sel.value ? '' : 'none';
        });

        td.appendChild(span);
        td.appendChild(sel);
        trStatus.appendChild(td);
      });

      tbody.appendChild(trStatus);
    });

    // ─── 出荷日行 ───
    const trShip = document.createElement('tr');
    trShip.className = 'row-shipping';

    const tdNoShip = document.createElement('td');
    tdNoShip.className = 'col-no';
    tdNoShip.textContent = '23';
    trShip.appendChild(tdNoShip);

    const tdItemShip = document.createElement('td');
    tdItemShip.className = 'col-item';
    tdItemShip.textContent = '工場出荷日';
    trShip.appendChild(tdItemShip);

    projects.forEach(proj => {
      const td = document.createElement('td');
      td.className = 'cell-date linked';
      td.textContent = fmtDate(proj.start_date);
      trShip.appendChild(td);
    });

    tbody.appendChild(trShip);
  }

  function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('visible');
  }

  function applyStatusStyle(dateTd, statusTd, sel, status) {
    dateTd.classList.remove('proc-done', 'proc-na');
    statusTd.classList.remove('proc-done');
    sel.classList.remove('sel-wip', 'sel-done');
    switch (status) {
      case '完了':
        dateTd.classList.add('proc-done');
        statusTd.classList.add('proc-done');
        sel.classList.add('sel-done');
        break;
      case '作業中':
        sel.classList.add('sel-wip');
        break;
      case '対象外':
        dateTd.classList.add('proc-na');
        break;
    }
  }

  async function saveStatus(projectNumber, machine, processNo, status) {
    try {
      const pn = String(projectNumber);
      const mc = machine || '';
      if (!status) {
        await sb.from('denki_process_status')
          .delete()
          .eq('project_number', pn)
          .eq('machine', mc)
          .eq('process_no', processNo);
      } else {
        await sb.from('denki_process_status').upsert(
          { project_number: pn, machine: mc, process_no: processNo, status },
          { onConflict: 'project_number,machine,process_no' }
        );
      }
    } catch(e) {
      console.warn('ステータス保存エラー:', e);
    }
  }

  init();
</script>
</body>
</html>
