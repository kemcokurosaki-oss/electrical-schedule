<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電気工程確認表</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
  <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<input id="fp-anchor" type="text" readonly style="position:fixed;opacity:0;pointer-events:none;width:0;height:0;border:none;">
<div id="fp-range-label"></div>

<div id="loading-overlay" class="visible">読み込み中...</div>

<header>
  <div class="tab-group">
    <button class="tab-btn active" id="tab-table">表形式</button>
    <button class="tab-btn" id="tab-gantt">ガントチャート</button>
  </div>
  <button id="btn-manage">工番管理</button>
</header>

<!-- 編集ポップアップ（表・ガント共通） -->
<div id="edit-popup">
  <div class="popup-box">
    <div class="popup-header">
      <div class="proc-name" id="popup-proc-name"></div>
      <div class="proj-info" id="popup-proj-info"></div>
    </div>
    <div class="popup-body">
      <div class="popup-field">
        <label>ステータス</label>
        <select id="popup-status">
          <option value="">─</option>
          <option value="作業中">作業中</option>
          <option value="完了">完了</option>
          <option value="対象外">対象外</option>
        </select>
      </div>
      <div class="popup-field">
        <label>開始日</label>
        <input type="date" id="popup-start">
      </div>
      <div class="popup-field">
        <label>終了日</label>
        <input type="date" id="popup-end">
      </div>
      <div class="popup-field">
        <label>担当者</label>
        <select id="popup-owner"></select>
      </div>
    </div>
    <div class="popup-footer">
      <button id="popup-cancel">キャンセル</button>
      <button id="popup-save">保存</button>
    </div>
  </div>
</div>

<!-- 工番管理モーダル -->
<div id="manage-modal">
  <div class="manage-box">
    <div class="manage-header">
      <h2>工番管理</h2>
      <button class="manage-close" id="manage-close">✕</button>
    </div>
    <div class="manage-body">
      <div class="manage-status-bar" id="manage-status"></div>
      <div class="manage-list" id="manage-list"></div>
    </div>
  </div>
</div>

<!-- 表ビュー -->
<div id="view-table">
  <div id="table-gap"></div>
  <div id="table-wrapper">
    <div id="no-data" style="display:none">工番が登録されていません。ヘッダーの「工番管理」から追加してください。</div>
    <table id="main-table" style="display:none">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- 詳細ビュー -->
<div id="view-detail">
  <div id="detail-topbar">
    <button id="btn-detail-back">← 一覧に戻る</button>
    <span id="detail-info-bar"></span>
  </div>
  <div id="detail-wrapper">
    <div id="detail-table-container"></div>
  </div>
</div>

<!-- ガントビュー -->
<div id="view-gantt">
  <div id="gantt-toolbar">
    <span class="toolbar-label">表示単位:</span>
    <button class="zoom-btn" id="zoom-day">日</button>
    <button class="zoom-btn zoom-active" id="zoom-week">週</button>
    <button id="btn-today">今日へ移動</button>
    <div class="gantt-legend">
      <span class="legend-item"><span class="legend-box eigyo"></span>営業</span>
      <span class="legend-item"><span class="legend-box sekkei"></span>設計</span>
      <span class="legend-item"><span class="legend-box denki"></span>電技</span>
      <span class="legend-item"><span class="legend-box sosou"></span>操業</span>
      <span class="legend-item"><span class="legend-box denso"></span>電装</span>
    </div>
  </div>
  <div id="gantt-container"></div>
</div>

<script src="config.js"></script>
<script src="state.js"></script>
<script src="utils.js"></script>
<script src="table.js"></script>
<script src="detail.js"></script>
<script src="edit.js"></script>
<script src="gantt.js"></script>
<script src="manage.js"></script>
<script src="app.js"></script>
</body>
</html>
